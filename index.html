<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFT">
<title>LIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;--fm:'JetBrains Mono',monospace;
  --r:14px;--rsm:9px;--rlg:20px;--ease:cubic-bezier(.4,0,.2,1);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0C0C0F;--bg2:#141418;--bg3:#1C1C22;--bg4:#26262F;--bg5:#30303C;
  --bdr:rgba(255,255,255,.07);--t1:#EEEEF2;--t2:#8F8FA3;--t3:#4A4A5A;
  --green:#3DDB82;--gd:rgba(61,219,130,.12);
  --blue:#5B9CF6;--bd:rgba(91,156,246,.12);
  --amber:#F5A623;--ad:rgba(245,166,35,.12);
  --red:#F06060;--rd:rgba(240,96,96,.12);
  --purple:#9B7FE8;--pd:rgba(155,127,232,.12);
  --teal:#2DD4C0;--td:rgba(45,212,192,.12);
  --sh:0 4px 24px rgba(0,0,0,.5);
}}
@media(prefers-color-scheme:light){:root{
  --bg:#F0F0F5;--bg2:#FFFFFF;--bg3:#F0F0F5;--bg4:#E4E4EC;--bg5:#D8D8E4;
  --bdr:rgba(0,0,0,.08);--t1:#12121A;--t2:#5A5A72;--t3:#ABABC0;
  --green:#14A85C;--gd:rgba(20,168,92,.1);
  --blue:#2563EB;--bd:rgba(37,99,235,.1);
  --amber:#C07C10;--ad:rgba(192,124,16,.1);
  --red:#D63B3B;--rd:rgba(214,59,59,.1);
  --purple:#6B4FCC;--pd:rgba(107,79,204,.1);
  --teal:#0F9E92;--td:rgba(15,158,146,.1);
  --sh:0 2px 16px rgba(0,0,0,.08);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:var(--fb);background:var(--bg);color:var(--t1)}
input,textarea{font-family:inherit;-webkit-appearance:none;appearance:none;}
button{font-family:inherit;-webkit-appearance:none;appearance:none;border:none;cursor:pointer;background:none}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{padding:calc(var(--sat) + 10px) 16px 10px;display:flex;align-items:center;gap:10px;background:var(--bg);border-bottom:1px solid var(--bdr);flex-shrink:0;z-index:20}
.topbar-title{font-family:var(--fd);font-size:26px;font-weight:800;letter-spacing:.5px;flex:1}
.iBtn{width:34px;height:34px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--t2);transition:all .15s var(--ease);flex-shrink:0}
.iBtn:active{transform:scale(.9);background:var(--bg4)}
.scroller{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroller::-webkit-scrollbar{display:none}
.bottomnav{display:flex;background:var(--bg2);border-top:1px solid var(--bdr);padding:8px 0 calc(var(--sab) + 6px);flex-shrink:0}
.navBtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;color:var(--t3);transition:color .15s var(--ease)}
.navBtn.on{color:var(--green)}
.navBtn svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor}
.navLbl{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}

.screen{display:none;padding:14px 14px calc(14px + var(--sab))}
.screen.on{display:block}

.lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin:20px 0 8px}
.lbl:first-child{margin-top:2px}
.card{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);box-shadow:var(--sh);overflow:hidden;margin-bottom:10px}
.cRow{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--bdr)}
.cRow:last-child{border-bottom:none}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;border:1px solid var(--bdr);background:var(--bg3);color:var(--t2);transition:all .15s var(--ease);cursor:pointer}
.chip.on{background:var(--green);color:#0A0A0A;border-color:var(--green)}
.chip:active{transform:scale(.94)}
.scrollRow{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.scrollRow::-webkit-scrollbar{display:none}

/* day cards */
.dayCard{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;transition:transform .12s var(--ease)}
.dayCard:active{transform:scale(.98)}
.dcTop{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.dDot{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:.5px;flex-shrink:0}
.dInfo{flex:1;min-width:0}
.dName{font-size:15px;font-weight:600}
.dSub{font-size:12px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.todayChip{font-size:10px;font-weight:700;color:var(--green);background:var(--gd);padding:3px 8px;border-radius:20px;letter-spacing:.04em}
.doneChip{font-size:10px;font-weight:700;color:var(--teal);background:var(--td);padding:3px 8px;border-radius:20px}
.dMeta{text-align:right;flex-shrink:0}
.dSets{font-family:var(--fm);font-size:12px;color:var(--t2)}
.dDur{font-size:11px;color:var(--t3);margin-top:2px}

/* week bar */
.weekBar{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.wbTop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.wbTitle{font-family:var(--fd);font-size:18px;font-weight:700;letter-spacing:.3px}
.wDays{display:flex;gap:4px}
.wDay{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wDot{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t3);transition:all .2s var(--ease)}
.wDot.done{background:var(--green);color:#0A0A0A}
.wDot.today{box-shadow:0 0 0 2px var(--green)}
.wLbl{font-size:8px;color:var(--t3);font-weight:600;letter-spacing:.05em}

/* workout */
.wHero{padding:18px 14px 14px;border-bottom:1px solid var(--bdr)}
.wHDay{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:3px}
.wHTitle{font-family:var(--fd);font-size:34px;font-weight:800;letter-spacing:.5px;line-height:1}
.wHSub{font-size:13px;color:var(--t2);margin-top:4px}
.wStats{display:flex;gap:20px;margin-top:12px}
.wStat{display:flex;flex-direction:column}
.wSV{font-family:var(--fm);font-size:17px;font-weight:600}
.wSL{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}

.blockCard{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);margin:10px 14px 0;overflow:hidden;box-shadow:var(--sh)}
.blockHdr{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--bdr)}
.blockNum{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:11px;font-weight:600;flex-shrink:0}
.blockName{font-size:13px;font-weight:600;flex:1}

.exWrap{padding:11px 14px;border-top:1px solid var(--bdr)}
.exTop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exName{font-size:14px;font-weight:600;flex:1}
.exRx{font-family:var(--fm);font-size:12px;font-weight:600;color:var(--green);white-space:nowrap}
.exNote{font-size:12px;color:var(--t2);margin-top:3px;line-height:1.5}
.exRpe{font-size:11px;color:var(--t3);margin-top:2px}
.exMuscle{font-size:11px;color:var(--blue);font-weight:600;margin-top:2px}
.exLast{font-size:11px;color:var(--t3);margin-top:3px;font-family:var(--fm)}

.setsWrap{margin-top:9px}
.setRow{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.setLbl{font-family:var(--fm);font-size:10px;color:var(--t3);width:22px;flex-shrink:0;text-align:center}
.inp{flex:1;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rsm);padding:8px 6px;font-family:var(--fm);font-size:14px;font-weight:500;color:var(--t1);text-align:center;outline:none;transition:all .15s var(--ease);min-width:0}
.inp:focus{border-color:var(--green);background:var(--gd)}
.inp::placeholder{color:var(--t3);font-size:11px}
.setOk{width:30px;height:30px;border-radius:50%;border:2px solid var(--bdr)!important;background:none;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .15s var(--ease);font-size:13px;flex-shrink:0}
.setOk.done{background:var(--green);border-color:var(--green);color:#0A0A0A}
.setOk:active{transform:scale(.88)}
.addSet{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--blue);padding:3px 0;margin-top:2px}

.rpeWrap{display:flex;gap:3px;margin-top:7px;align-items:center}
.rpeLbl{font-size:10px;color:var(--t3);font-weight:600;width:28px;flex-shrink:0}
.rpeB{flex:1;padding:5px 2px;border-radius:6px;border:1px solid var(--bdr);background:var(--bg3);font-family:var(--fm);font-size:11px;font-weight:600;color:var(--t2);text-align:center;transition:all .12s var(--ease)}
.rpeB.on{background:var(--amber);border-color:var(--amber);color:#0A0A0A}
.rpeB:active{transform:scale(.9)}

.noteInp{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--rsm);padding:9px 11px;font-size:13px;color:var(--t1);outline:none;min-height:60px;line-height:1.5;margin-top:7px;transition:border-color .15s}
.noteInp:focus{border-color:var(--blue)}
.noteInp::placeholder{color:var(--t3)}

.finBtn{width:100%;padding:15px;border-radius:var(--r);background:var(--green);font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:1px;color:#0A0A0A;transition:all .15s var(--ease);margin:16px 0 0}
.finBtn:active{transform:scale(.97);opacity:.9}

/* overload indicator */
.poFlag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--gd);color:var(--green);letter-spacing:.04em;margin-top:4px;text-transform:uppercase}
.poFlagAmber{background:var(--ad);color:var(--amber)}

/* history drawer */
.exHistBtn{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--blue);padding:5px 0 2px;margin-top:2px;background:none;border:none;cursor:pointer}
.exHistBtn svg{transition:transform .2s var(--ease)}
.exHistBtn.open svg{transform:rotate(180deg)}
.exHistDrawer{display:none;margin-top:8px;border-radius:var(--rsm);overflow:hidden;border:1px solid var(--bdr)}
.exHistDrawer.on{display:block}
.ehdRow{display:grid;grid-template-columns:64px 1fr auto;gap:6px;align-items:start;padding:8px 10px;border-bottom:1px solid var(--bdr);background:var(--bg3)}
.ehdRow:last-child{border-bottom:none}
.ehdRow.current{background:var(--gd)}
.ehdDate{font-size:10px;color:var(--t3);font-family:var(--fm);padding-top:1px}
.ehdSets{font-size:11px;color:var(--t1);font-family:var(--fm);line-height:1.7}
.ehdMax{font-size:11px;font-weight:700;font-family:var(--fm);text-align:right;white-space:nowrap}
.ehdTrend{font-size:9px;margin-top:2px;text-align:right}
.ehdHeader{display:grid;grid-template-columns:64px 1fr auto;gap:6px;padding:6px 10px;background:var(--bg4);border-bottom:1px solid var(--bdr)}
.ehdHLbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}

/* progress */
.statGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.statTile{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);padding:14px;box-shadow:var(--sh)}
.statV{font-family:var(--fd);font-size:38px;font-weight:800;letter-spacing:.5px;line-height:1}
.statL{font-size:11px;color:var(--t2);font-weight:600;margin-top:3px}
.statS{font-size:11px;color:var(--t3);margin-top:2px}
.chartTile{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);padding:14px;box-shadow:var(--sh);margin-bottom:10px}
.ctTitle{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
canvas{width:100%!important;display:block}
.wcGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.wcCell{background:var(--bg3);border-radius:var(--rsm);padding:10px}
.wcLbl{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.wcVal{font-family:var(--fm);font-size:18px;font-weight:600;margin-top:2px}
.wcDiff{font-size:11px;margin-top:2px;font-weight:600}

/* diet */
.macroBW{margin-bottom:8px}
.mbTop{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.mbName{font-weight:600}
.mbVals{font-family:var(--fm);color:var(--t2)}
.mbTrack{height:7px;border-radius:4px;background:var(--bg3);overflow:hidden}
.mbFill{height:100%;border-radius:4px;transition:width .5s var(--ease)}
.mealRow{padding:11px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;gap:10px}
.mealRow:last-child{border-bottom:none}
.mTime{font-family:var(--fm);font-size:11px;color:var(--t3);width:40px;flex-shrink:0;padding-top:2px}
.mInfo{flex:1;min-width:0}
.mName{font-size:13px;font-weight:600}
.mMacros{font-family:var(--fm);font-size:11px;color:var(--t2);margin-top:2px}
.mDel{color:var(--red);font-size:20px;padding:0 2px;line-height:1}

/* sleep */
.sleepLocBtns{display:flex;gap:6px;margin-top:6px}
.sleepLocBtn{flex:1;padding:8px 6px;border-radius:var(--rsm);border:1px solid var(--bdr);background:var(--bg3);font-size:12px;font-weight:600;color:var(--t2);text-align:center;transition:all .15s var(--ease);cursor:pointer}
.sleepLocBtn.on{border-color:var(--purple);background:var(--pd);color:var(--purple)}
.sleepLocBtn:active{transform:scale(.95)}
.sleepQBtns{display:flex;gap:4px;margin-top:6px}
.sleepQBtn{flex:1;padding:7px 3px;border-radius:var(--rsm);border:1px solid var(--bdr);background:var(--bg3);font-size:13px;text-align:center;transition:all .15s var(--ease);cursor:pointer}
.sleepQBtn.on{border-color:var(--amber);background:var(--ad)}
.sleepQBtn:active{transform:scale(.9)}
.sleepRow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr)}
.sleepRow:last-child{border-bottom:none}
.sleepDot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sleepInfo{flex:1}
.sleepHrs{font-size:14px;font-weight:600;font-family:var(--fm)}
.sleepMeta{font-size:11px;color:var(--t2);margin-top:1px}
.sleepDel{color:var(--red);font-size:18px;padding:0 3px}

/* brand picker */
.brandPicker{margin-top:7px}
.brandGroupLabel{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin:5px 0 3px}
.brandChips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:2px}
.brandChip{font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .12s var(--ease);white-space:nowrap}
.brandChip.on{background:var(--td);color:var(--teal);border-color:var(--teal)}
.brandChip:active{transform:scale(.93)}
.brandCustomWrap{margin-top:4px}
.brandCustomInp{width:100%;font-size:12px;padding:6px 10px;border-radius:20px;background:var(--bg3);color:var(--t1);border:1px solid var(--bdr);outline:none;transition:border-color .15s}
.brandCustomInp:focus{border-color:var(--teal);background:var(--td)}

/* history */
.histItem{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh)}
.histHdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.histDot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.histInfo{flex:1;min-width:0}
.histTitle{font-size:14px;font-weight:600}
.histDate{font-size:12px;color:var(--t2);margin-top:1px}
.histBadge{font-family:var(--fm);font-size:12px;color:var(--t3)}
.histDetail{display:none;padding:10px 14px 12px;border-top:1px solid var(--bdr)}
.histDetail.on{display:block}
.hEx{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--bdr)}
.hEx:last-child{border-bottom:none}
.hExName{font-size:13px;font-weight:500;flex:1}
.hExSets{font-family:var(--fm);font-size:11px;color:var(--t2);text-align:right;max-width:55%}

/* skills */
.skillCard{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
.skillTop{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.skillIco{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sName{font-size:15px;font-weight:600}
.sCur{font-size:12px;color:var(--t2);margin-top:1px}
.progTrack{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:8px}
.progFill{height:100%;border-radius:3px;transition:width .6s var(--ease)}
.milestones{display:flex;gap:5px;flex-wrap:wrap}
.ms{font-size:10px;padding:3px 7px;border-radius:20px;font-weight:600;cursor:pointer}
.ms.done{background:var(--gd);color:var(--green)}
.ms.next{background:var(--ad);color:var(--amber)}
.ms.fut{background:var(--bg3);color:var(--t3)}
.skillLogBtn{width:100%;padding:9px;border-radius:var(--rsm);background:var(--bg3);border:1px solid var(--bdr);font-size:12px;font-weight:700;color:var(--blue);margin-top:10px;transition:all .12s}
.skillLogBtn:active{background:var(--bd)}

/* editor */
.edSection{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.edHdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bdr);cursor:pointer}
.edHdrTitle{font-size:14px;font-weight:600}
.edBody{padding:12px 14px;display:none}
.edBody.on{display:block}
.edExRow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.edExRow:last-of-type{border-bottom:none}
.edExName{flex:1;font-size:13px;font-weight:500}
.edExRx{font-family:var(--fm);font-size:11px;color:var(--t2)}
.addExBtn{width:100%;padding:9px;border-radius:var(--rsm);background:var(--bd);border:1px dashed var(--blue);font-size:12px;font-weight:700;color:var(--blue);margin-top:8px;transition:all .12s}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(6px)}
.overlay.on{display:flex}
.sheet{width:100%;background:var(--bg2);border-radius:22px 22px 0 0;padding:16px 18px calc(var(--sab) + 22px);max-height:88vh;overflow-y:auto;animation:slideUp .28s var(--ease)}
.sheet::-webkit-scrollbar{display:none}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 16px}
.shTitle{font-family:var(--fd);font-size:26px;font-weight:800;letter-spacing:.5px;margin-bottom:4px}
.shSub{font-size:13px;color:var(--t2);margin-bottom:14px}

.field{margin-bottom:12px}

// ── Draft auto-save (debounced, lightweight) ────────────────
let _draftTimer=null;
function saveDraft(){
  if(!CUR_DAY||!WS)return;
  clearTimeout(_draftTimer);
  _draftTimer=setTimeout(()=>{
    try{
      localStorage.setItem(WS_DRAFT_KEY, JSON.stringify({
        dayId: CUR_DAY.id,
        date: today(),
        ws: WS
      }));
    }catch(e){}
  }, 600); // 600ms debounce — won't fire on every keystroke
}

function loadDraft(){
  try{
    const raw=localStorage.getItem(WS_DRAFT_KEY);
    if(!raw)return null;
    const draft=JSON.parse(raw);
    // Only restore if it's from today and the day still exists in program
    if(draft.date===today()&&PROG.days.find(d=>d.id===draft.dayId))return draft;
    // Stale draft — clear it
    localStorage.removeItem(WS_DRAFT_KEY);
  }catch(e){}
  return null;
}

function clearDraft(){
  try{localStorage.removeItem(WS_DRAFT_KEY);}catch(e){}
}

function load(){
  try{const r=localStorage.getItem('lift_v5');if(r){const d=JSON.parse(r);S={...S,...d};}const p=localStorage.getItem('lift_prog_v5');PROG=p?JSON.parse(p):JSON.parse(JSON.stringify(DEFAULT_PROG));if(!S.skills||!S.skills.length)S.skills=JSON.parse(JSON.stringify(DEFAULT_SKILLS));}
  catch(e){PROG=JSON.parse(JSON.stringify(DEFAULT_PROG));S.skills=JSON.parse(JSON.stringify(DEFAULT_SKILLS));}
}
function save(){try{localStorage.setItem('lift_v5',JSON.stringify(S));}catch(e){}}
function saveProg(){try{localStorage.setItem('lift_prog_v5',JSON.stringify(PROG));}catch(e){}}

function goScreen(name,title){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.navBtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('sc-'+name).classList.add('on');
  const nb=document.getElementById('nav-'+name);if(nb)nb.classList.add('on');
  document.getElementById('tbTitle').textContent=title||'LIFT';
  document.getElementById('btnBack').style.display=name==='workout'?'flex':'none';
  document.getElementById('btnEdit').style.display=name==='home'?'flex':'none';
  document.getElementById('scroller').scrollTop=0;
  if(name==='progress')renderProgress();
  if(name==='history')renderHistory();
  if(name==='diet')renderDiet();
}
function navBack(){goScreen('home');}

// ═══════════════════════ HELPERS ═══════════════════════
function today(){return new Date().toLocaleDateString('en-US');}
function wkKey(ds){const d=ds?new Date(ds):new Date();const dy=d.getDay();const m=new Date(d);m.setDate(d.getDate()-(dy===0?6:dy-1));return m.toLocaleDateString('en-US');}
function isThisWk(ds){return wkKey(ds)===wkKey();}
function isLastWk(ds){const lw=new Date();lw.setDate(lw.getDate()-7);return wkKey(ds)===wkKey(lw.toLocaleDateString('en-US'));}
function fmtDate(ds){if(!ds)return '—';const d=new Date(ds);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',weekday:'short'});}
function toInputDate(ds){
  // Convert "5/23/2026" → "2026-05-23" for <input type="date">
  if(!ds)return '';
  const d=new Date(ds);
  if(isNaN(d))return '';
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fromInputDate(iso){
  // Convert "2026-05-23" → "5/23/2026" without UTC shift
  if(!iso)return '';
  const [y,m,d]=iso.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US');
}
function getLastSession(exId){for(let i=S.history.length-1;i>=0;i--){const ex=S.history[i].exercises?.find(e=>e.id===exId);if(ex)return ex;}return null;}
function fmtSets(sets){if(!sets?.length)return '—';return sets.filter(s=>s.weight||s.reps).slice(0,3).map(s=>`${s.weight||'?'}×${s.reps||'?'}`).join('  ');}

// Returns last N sessions for a given exercise id, newest first
function getExHistory(exId,n=5){
  const out=[];
  for(let i=0;i<S.history.length&&out.length<n;i++){
    const h=S.history[i];const ex=h.exercises?.find(e=>e.id===exId);
    if(ex)out.push({date:h.date,sets:ex.sets,rpe:ex.rpe});
  }
  return out;
}

// Parse rx string like "3 × 8-12" or "4 × 5-6" to get rep ceiling
function parseRxCeil(rx){
  const m=rx.match(/(\d+)\s*[-–]\s*(\d+)/);if(m)return parseInt(m[2]);
  const m2=rx.match(/×\s*(\d+)/);if(m2)return parseInt(m2[1]);
  return null;
}

// Check if overload is due: last 2 sessions both hit the rep ceiling across all sets
// Excludes any session logged today so a completed workout doesn't immediately re-trigger the flag
function getOverloadStatus(exId,rx){
  const allHist=getExHistory(exId,4);
  // Filter out sessions from today — if you already completed this workout today,
  // don't count it when deciding whether to show the overload flag
  const hist=allHist.filter(h=>h.date!==today());
  if(hist.length<1)return null;
  const ceil=parseRxCeil(rx);if(!ceil)return null;
  const checkSession=(sess)=>{
    const ws=sess.sets.filter(s=>s.weight||s.reps);if(!ws.length)return false;
    return ws.every(s=>parseInt(s.reps)>=ceil);
  };
  const lastHitCeil=checkSession(hist[0]);
  const prevHitCeil=hist.length>=2&&checkSession(hist[1]);
  if(lastHitCeil&&prevHitCeil)return 'overload';
  if(lastHitCeil)return 'approaching';
  return null;
}
function cOf(c){const m={green:'var(--green)',blue:'var(--blue)',amber:'var(--amber)',purple:'var(--purple)',teal:'var(--teal)'};return m[c]||'var(--t3)';}
function bgOf(c){const m={green:'var(--gd)',blue:'var(--bd)',amber:'var(--ad)',purple:'var(--pd)',teal:'var(--td)'};return m[c]||'var(--bg3)';}
function wkNum(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+4-(d.getDay()||7));const y=new Date(d.getFullYear(),0,1);return Math.ceil((((d-y)/86400000)+1)/7);}
function countSets(day){return day.blocks.reduce((t,b)=>t+b.exercises.reduce((a,e)=>a+e.sets,0),0);}
function todaySteps(){const t=S.steps.find(s=>s.date===today());return t?t.steps:'';}

// ═══════════════════════ WORKOUT ═══════════════════════
function openWorkout(dayId){
  const day=PROG.days.find(d=>d.id===dayId);if(!day||day.rest)return;
  CUR_DAY=day;

  // Check for an in-progress draft from today
  const draft=loadDraft();
  if(draft&&draft.dayId===dayId){
    WS=draft.ws;
    // Ensure any exercises added/removed from program since draft are reconciled
    day.blocks.forEach(b=>b.exercises.forEach(ex=>{
      if(!WS[ex.id]){
        const last=getLastSession(ex.id);
        WS[ex.id]={sets:Array.from({length:ex.sets},(_,i)=>({weight:last?.sets[i]?.weight||'',reps:last?.sets[i]?.reps||'',done:false})),rpe:null,note:''};
      }
    }));
  } else {
    WS={};
    day.blocks.forEach(b=>b.exercises.forEach(ex=>{
      const last=getLastSession(ex.id);
      WS[ex.id]={sets:Array.from({length:ex.sets},(_,i)=>({weight:last?.sets[i]?.weight||'',reps:last?.sets[i]?.reps||'',done:false})),rpe:null,note:''};
    }));
  }

  goScreen('workout',day.short);
  document.getElementById('workoutContent').innerHTML=buildWorkout(day);

  // Show resume banner if restoring a draft
  if(draft&&draft.dayId===dayId){
    const banner=document.createElement('div');
    banner.style.cssText='position:sticky;top:0;z-index:10;background:var(--gd);border-bottom:1px solid var(--green);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--green)';
    banner.innerHTML=`<span>↩ Session restored from earlier today</span><button onclick="this.parentElement.remove()" style="color:var(--green);font-size:16px;line-height:1">×</button>`;
    document.getElementById('workoutContent').prepend(banner);
  }
}

function setRowHTML(exId,si,s){return `<div class="setRow" id="sr-${exId}-${si}"><span class="setLbl">S${si+1}</span><input class="inp" type="number" inputmode="decimal" placeholder="lbs" value="${s.weight}" onchange="WS['${exId}'].sets[${si}].weight=this.value;saveDraft()" onfocus="this.select()"><input class="inp" type="number" inputmode="decimal" placeholder="reps" value="${s.reps}" onchange="WS['${exId}'].sets[${si}].reps=this.value;saveDraft()" onfocus="this.select()"><button class="setOk ${s.done?'done':''}" onclick="togSet('${exId}',${si})">${s.done?'✓':''}</button></div>`;}

function togSet(exId,si){const s=WS[exId].sets[si];s.done=!s.done;const b=document.querySelector(`#sr-${exId}-${si} .setOk`);if(b){b.className=`setOk ${s.done?'done':''}`;b.textContent=s.done?'✓':'';}if(s.done&&navigator.vibrate)navigator.vibrate(8);saveDraft();}
function addSet(exId){const d=WS[exId];const last=d.sets[d.sets.length-1];d.sets.push({weight:last?.weight||'',reps:last?.reps||'',done:false});const si=d.sets.length-1;const sw=document.getElementById('sw-'+exId);const btn=sw.querySelector('.addSet');const div=document.createElement('div');div.innerHTML=setRowHTML(exId,si,d.sets[si]);sw.insertBefore(div.firstElementChild,btn);saveDraft();}
function setRPE(exId,val){WS[exId].rpe=val;document.querySelectorAll(`#ex-${exId} .rpeB`).forEach((b,i)=>b.classList.toggle('on',[6,7,8,9,10][i]===val));saveDraft();}

function togHistDrawer(exId){
  const btn=document.getElementById('histBtn-'+exId);
  const drawer=document.getElementById('histDrawer-'+exId);

  const maxWeights=hist.map(h=>{const ws=h.sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0);return ws.length?Math.max(...ws):0;});
  let rows=`<div class="ehdHeader"><span class="ehdHLbl">Date</span><span class="ehdHLbl">Sets</span><span class="ehdHLbl">Max</span></div>`;
  hist.forEach((h,i)=>{

    const max=maxWeights[i];

    const d=new Date(h.date);const dateStr=(d.getMonth()+1)+'/'+d.getDate();

    rows+=`<div class="ehdRow${i===0?' current':''}">

function finishWorkout(){
  const day=CUR_DAY;
  const steps=document.getElementById('steps-w')?.value;
  if(steps){S.steps=S.steps.filter(s=>s.date!==today());S.steps.unshift({date:today(),steps:parseInt(steps)||0});}
  const exercises=[];
  day.blocks.forEach(b=>b.exercises.forEach(ex=>{const d=WS[ex.id];if(d.sets.filter(s=>s.weight||s.reps).length)exercises.push({id:ex.id,name:ex.name,sets:d.sets,rpe:d.rpe,note:d.note,brand:d.brand||''});}));
  const mi=document.getElementById('c-mi')?.value;const pace=document.getElementById('c-pace')?.value;
  S.history.unshift({id:Date.now(),date:today(),dayId:day.id,name:day.title,dur:day.dur,exercises,cardio:mi?{miles:mi,pace}:null,week:wkKey()});
  clearDraft(); // remove in-progress draft now that session is saved
  save();toast('Workout saved 💪');setTimeout(()=>{navBack();renderHome();},500);
}

function macroBars(tot){
  return [{name:'Protein',val:tot.p,target:TARGETS.protein,unit:'g',col:'var(--blue)'},{name:'Carbs',val:tot.c,target:TARGETS.carbs,unit:'g',col:'var(--amber)'},{name:'Fat',val:tot.f,target:TARGETS.fat,unit:'g',col:'var(--purple)'},{name:'Calories',val:tot.cal,target:TARGETS.calories,unit:'kcal',col:'var(--green)'}]
    .map(b=>{const pct=Math.min(100,Math.round((b.val/b.target)*100));const over=b.val>b.target;return `<div class="macroBW"><div class="mbTop"><span class="mbName">${b.name}</span><span class="mbVals">${b.val}${b.unit} / ${b.target}${b.unit}</span></div><div class="mbTrack"><div class="mbFill" style="width:${pct}%;background:${over?'var(--red)':b.col}"></div></div></div>`;}).join('');
}

function saveBW(v){S.bodyWeight=S.bodyWeight.filter(b=>b.date!==today());if(v)S.bodyWeight.unshift({date:today(),weight:parseFloat(v)});save();}
function saveSteps(v){S.steps=S.steps.filter(s=>s.date!==today());if(v)S.steps.unshift({date:today(),steps:parseInt(v)||0});save();}
function saveCaffeine(v){
  S.caffeine=S.caffeine.filter(c=>c.date!==today());
  const mg=parseInt(v)||0;
  if(mg>0)S.caffeine.unshift({date:today(),mg});
  save();
  // Update inline status text without full re-render
  const el=document.getElementById('caf-inp');
  if(el){el.style.borderColor=mg>400?'var(--red)':mg>200?'var(--amber)':'';}
  toast(`${mg}mg logged ☕`);
}

function drawCafChart(data){
  const canvas=document.getElementById('caf-chart');if(!canvas)return;
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const W=canvas.parentElement.clientWidth-28,H=100,dpr=window.devicePixelRatio||1;
  canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const pad={t:10,r:10,b:22,l:10};const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const n=data.length;const sp=gW/n;const bw=Math.min(sp-5,24);
  const maxMg=Math.max(500,...data.map(d=>d.mg));
  // 400mg limit line
  const limitY=pad.t+gH-((400/maxMg)*gH);
  ctx.beginPath();ctx.moveTo(pad.l,limitY);ctx.lineTo(W-pad.r,limitY);
  ctx.strokeStyle='rgba(240,96,96,0.45)';ctx.lineWidth=1.2;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle=isDark?'rgba(240,96,96,0.35)':'rgba(214,59,59,0.3)';ctx.font='8px JetBrains Mono';ctx.textAlign='left';ctx.fillText('400mg',pad.l+2,limitY-3);
  data.forEach((d,i)=>{
    if(!d.mg)return;
    const bh=(d.mg/maxMg)*gH;const x=pad.l+i*sp+sp/2-bw/2;const y=pad.t+gH-bh;
    const over=d.mg>400;const mod=d.mg>200;
    ctx.fillStyle=over?(isDark?'rgba(240,96,96,0.7)':'rgba(214,59,59,0.6)'):mod?(isDark?'rgba(245,166,35,0.65)':'rgba(192,124,16,0.55)'):(isDark?'rgba(61,219,130,0.6)':'rgba(20,168,92,0.5)');
    ctx.beginPath();ctx.roundRect(x,y,bw,bh,3);ctx.fill();
    ctx.fillStyle=isDark?'#8F8FA3':'#5A5A72';ctx.font='8px JetBrains Mono';ctx.textAlign='center';
    ctx.fillText(d.mg>=1000?d.mg/1000+'k':d.mg,x+bw/2,y-3);
    const dd=new Date(d.date);ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='8px Barlow';ctx.fillText(['S','M','T','W','T','F','S'][dd.getDay()],x+bw/2,H-4);
  });
}

function saveSleepField(field,val){
  let sl=S.sleep.find(s=>s.date===today());
  if(!sl){sl={date:today(),hrs:0,loc:'',q:0};S.sleep.unshift(sl);}
  if(field==='hrs')sl.hrs=parseFloat(val)||0;
  else if(field==='loc')sl.loc=sl.loc===val?'':val; // toggle
  else if(field==='q')sl.q=sl.q===val?0:val; // toggle
  save();
  // Update UI without full re-render
  const slNow=S.sleep.find(s=>s.date===today());
  // refresh loc buttons
  document.querySelectorAll('.sleepLocBtn').forEach(b=>{ b.classList.toggle('on',b.textContent.includes('Home')&&slNow?.loc==='home'||b.textContent.includes('Travel')&&slNow?.loc==='travel');});
  // refresh quality buttons
  document.querySelectorAll('.sleepQBtn').forEach((b,i)=>b.classList.toggle('on',slNow?.q===i+1));
  toast(field==='hrs'?`Sleep: ${val} hrs logged`:field==='loc'?`Location: ${val}`:field==='q'?'Quality saved':'Saved');
}

function drawSleepChart(data){
  const canvas=document.getElementById('sleep-chart');if(!canvas)return;
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const W=canvas.parentElement.clientWidth-28,H=110,dpr=window.devicePixelRatio||1;
  canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const pad={t:10,r:10,b:24,l:10};const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const n=data.length;const sp=gW/n;const bw=Math.min(sp-5,24);
  const maxH=10; // max hours on chart

  // target zone (7-9 hrs)
  const ty1=pad.t+gH-((9/maxH)*gH);const ty2=pad.t+gH-((7/maxH)*gH);
  ctx.fillStyle=isDark?'rgba(61,219,130,0.06)':'rgba(20,168,92,0.06)';
  ctx.fillRect(pad.l,ty1,gW,ty2-ty1);
  // target lines
  [7,9].forEach(h=>{const y=pad.t+gH-((h/maxH)*gH);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.strokeStyle=isDark?'rgba(61,219,130,0.2)':'rgba(20,168,92,0.2)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);});
  ctx.fillStyle=isDark?'rgba(61,219,130,0.4)':'rgba(20,168,92,0.3)';ctx.font='8px JetBrains Mono';ctx.textAlign='right';ctx.fillText('9h',pad.l+18,ty1+3);ctx.fillText('7h',pad.l+18,ty2+3);

  data.forEach((d,i)=>{
    if(!d.hrs)return;
    const bh=(d.hrs/maxH)*gH;const x=pad.l+i*sp+sp/2-bw/2;const y=pad.t+gH-bh;
    const isHome=d.loc==='home';const isTravel=d.loc==='travel';
    // bar color: purple=home, amber=travel, blue=unset
    const barCol=isHome?(isDark?'rgba(155,127,232,0.7)':'rgba(107,79,204,0.6)'):isTravel?(isDark?'rgba(245,166,35,0.7)':'rgba(192,124,16,0.6)'):(isDark?'rgba(91,156,246,0.5)':'rgba(37,99,235,0.4)');
    ctx.fillStyle=barCol;ctx.beginPath();ctx.roundRect(x,y,bw,bh,3);ctx.fill();
    // quality dot at top
    if(d.q){const dotY=y-7;const dotX=x+bw/2;ctx.beginPath();ctx.arc(dotX,dotY,3,0,Math.PI*2);ctx.fillStyle=d.q>=4?'var(--green)':d.q>=2?'var(--amber)':'var(--red)';ctx.fill();}
    // hours label
    if(d.hrs>0){ctx.fillStyle=isDark?'#8F8FA3':'#5A5A72';ctx.font='8px JetBrains Mono';ctx.textAlign='center';ctx.fillText(d.hrs,x+bw/2,y-10+(d.q?0:2));}
    // day label
    const dd=new Date(d.date);ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='8px Barlow';ctx.fillText(['S','M','T','W','T','F','S'][dd.getDay()],x+bw/2,H-4);
  });
}

function saveMeal(andSave){
  const p=parseFloat(document.getElementById('m-p').value)||0;
  const c=parseFloat(document.getElementById('m-c').value)||0;
  const f=parseFloat(document.getElementById('m-f').value)||0;
  const calInp=parseFloat(document.getElementById('m-cal').value);
  const cal=calInp||Math.round(p*4+c*4+f*9);
  const name=document.getElementById('m-name').value||'Meal';
  S.diet.unshift({id:Date.now(),date:today(),name,p,c,f,cal,time:document.getElementById('m-time').value,note:document.getElementById('m-note').value||''});
  if(andSave){
    if(!S.savedMeals)S.savedMeals=[];
    if(!S.savedMeals.find(m=>m.name.toLowerCase()===name.toLowerCase())){
      S.savedMeals.push({name,p,c,f,cal});
      toast('Logged + saved to library 📌');
    } else {
      toast('Logged (already in library)');
    }
  } else {
    toast('Meal logged 🥗');
  }
  save();closeOverlay();setTimeout(renderDiet,100);
}
function delMeal(id){S.diet=S.diet.filter(m=>m.id!==id);save();renderDiet();toast('Meal removed');}

function drawDietChart(data){
  const canvas=document.getElementById('diet-chart');if(!canvas)return;
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const W=canvas.parentElement.clientWidth-28,H=130,dpr=window.devicePixelRatio||1;
  canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const pad={t:10,r:10,b:24,l:10};const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const n=data.length,maxCal=Math.max(TARGETS.calories*1.2,...data.map(d=>d.cal),1);
  const sp=gW/n,bw=Math.min(sp-4,22);
  data.forEach((d,i)=>{
    const bh=(d.cal/maxCal)*gH;const x=pad.l+i*sp+sp/2-bw/2;const y=pad.t+gH-bh;
    ctx.fillStyle=d.cal>TARGETS.calories?'rgba(240,96,96,0.5)':'rgba(61,219,130,0.4)';
    ctx.beginPath();ctx.roundRect(x,y,bw,bh,3);ctx.fill();
    ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='8px Barlow';ctx.textAlign='center';
    const dd=new Date(d.date);ctx.fillText(['S','M','T','W','T','F','S'][dd.getDay()],x+bw/2,H-4);
  });
  const maxP=Math.max(TARGETS.protein*1.3,...data.map(d=>d.prot),1);
  ctx.beginPath();data.forEach((d,i)=>{const x=pad.l+i*sp+sp/2;const y=pad.t+gH-((d.prot/maxP)*gH);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.strokeStyle=isDark?'#5B9CF6':'#2563EB';ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  const ty=pad.t+gH-((TARGETS.calories/maxCal)*gH);
  ctx.beginPath();ctx.moveTo(pad.l,ty);ctx.lineTo(W-pad.r,ty);ctx.strokeStyle='rgba(245,166,35,0.5)';ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
}

    <div class="chartTile">

      </div>
    </div>
    ${S.bodyWeight.length>=2?`<div class="lbl">Body Weight Trend</div><div class="chartTile"><div class="ctTitle">Weight <span style="font-size:11px;color:var(--t3)">${S.bodyWeight.length>=1?'Latest: '+S.bodyWeight[0].weight+'lbs':''}</span></div><canvas id="pg-bw" height="120"></canvas></div>`:''}
    ${S.steps.length>=2?`<div class="lbl">Daily Steps</div><div class="chartTile"><canvas id="pg-steps" height="100"></canvas></div>`:''}
    <div class="lbl">Strength Progress</div>
    <div class="scrollRow" id="liftChips" style="margin-bottom:8px"></div>

    </div>

function wcStat(lbl,cur,prev,unit){const diff=cur-prev;const up=diff>0;return `<div class="wcCell"><div class="wcLbl">${lbl}</div><div class="wcVal" style="color:${up?'var(--green)':diff<0?'var(--red)':'var(--blue)'}">${cur}${unit}</div><div class="wcDiff" style="color:${up?'var(--green)':diff<0?'var(--red)':'var(--t3)'}">${diff>0?'+':''}${diff}${unit} vs last week</div></div>`;}

function calcStreak(){if(!S.history.length)return 0;const dates=[...new Set(S.history.map(h=>h.date))].sort((a,b)=>new Date(b)-new Date(a));let streak=0;let cur=new Date();cur.setHours(0,0,0,0);for(const d of dates){const dd=new Date(d);dd.setHours(0,0,0,0);if(Math.round((cur-dd)/86400000)>1)break;streak++;cur=dd;}return streak;}

function getTrackedLifts(){
  const seen=new Set(),out=[];
  S.history.forEach(h=>h.exercises?.forEach(e=>{
    if(!seen.has(e.id)){seen.add(e.id);out.push({id:e.id,name:e.name});}
  }));
  return out.slice(0,16);
}

function renderLiftChips(){
  const lifts=getTrackedLifts();
  const wrap=document.getElementById('liftChips');if(!wrap)return;
  if(!lifts.length){wrap.innerHTML='<span style="font-size:12px;color:var(--t3)">Log workouts to see lift progress.</span>';return;}
  if(!SEL_LIFT&&lifts.length)SEL_LIFT=lifts[0].id;
  wrap.innerHTML=lifts.map(l=>`<button class="chip ${SEL_LIFT===l.id?'on':''}" onclick="selLift('${l.id}')">${l.name.split(' ').slice(0,3).join(' ')}</button>`).join('');
  if(SEL_LIFT)drawLiftChart(SEL_LIFT);
}

function selLift(id){SEL_LIFT=id;renderLiftChips();}

function setMetric(m){
  SEL_METRIC=m;
  ['max','best','vol'].forEach(k=>{
    const el=document.getElementById('mt-'+k);
    if(el)el.classList.toggle('on',k===m);
  });
  if(SEL_LIFT)drawLiftChart(SEL_LIFT);
}

// Compute per-session metrics for one exercise
function calcExMetrics(exSessions){
  return exSessions.map(s=>{
    const sets=s.sets.filter(x=>(parseFloat(x.weight)||0)>0||(parseInt(x.reps)||0)>0);
    const wSets=sets.map(x=>({w:parseFloat(x.weight)||0,r:parseInt(x.reps)||0}));
    const maxW=Math.max(0,...wSets.map(x=>x.w));
    const bestSetVol=Math.max(0,...wSets.map(x=>x.w*x.r));
    const bestSet=wSets.reduce((best,x)=>x.w*x.r>best.w*best.r?x:best,{w:0,r:0});
    const totalVol=wSets.reduce((t,x)=>t+x.w*x.r,0);
    return {date:s.date,maxW,bestSet,bestSetVol,totalVol,sets:wSets,brand:s.brand||''};
  });
}

function drawLiftChart(lid){
  const canvas=document.getElementById('liftChart');if(!canvas)return;

  // Collect sessions for this lift, newest first → reverse for chart
  const raw=[];
  S.history.slice().reverse().forEach(h=>{
    const ex=h.exercises?.find(e=>e.id===lid);
    if(ex&&ex.sets?.some(s=>s.weight||s.reps)){
      raw.push({date:h.date,sets:ex.sets,brand:ex.brand||''});
    }
  });

  const metrics=calcExMetrics(raw);

  // Metric selector
  const yFn={
    max:m=>m.maxW,
    best:m=>m.bestSetVol,
    vol:m=>m.totalVol
  }[SEL_METRIC];

  const labels={
    max:'Max weight (lbs)',
    best:'Best set volume (lbs × reps)',
    vol:'Total session volume (lbs × reps)'
  }[SEL_METRIC];

  const vals=metrics.map(yFn);
  const dates=metrics.map(m=>{const d=new Date(m.date);return(d.getMonth()+1)+'/'+d.getDate();});

  // Update meta text
  const meta=document.getElementById('liftChartMeta');
  if(meta)meta.textContent=labels+(metrics.length?` · ${metrics.length} sessions logged`:'');

  // Update summary block
  const summary=document.getElementById('liftSummary');
  if(summary&&metrics.length){
    const latest=metrics[metrics.length-1];
    const prev=metrics.length>=2?metrics[metrics.length-2]:null;
    const allTime=metrics.reduce((best,m)=>yFn(m)>yFn(best)?m:best,metrics[0]);

    const diffStr=prev?(()=>{
      const d=yFn(latest)-yFn(prev);
      const col=d>0?'var(--green)':d<0?'var(--red)':'var(--t3)';
      const sym=d>0?'↑':d<0?'↓':'→';
      return `<span style="color:${col};font-weight:700">${sym} ${Math.abs(Math.round(d))} vs last session</span>`;
    })():'';

    const brandNote=latest.brand?`<div style="font-size:11px;color:var(--teal);margin-top:3px">Last logged on: ${latest.brand}</div>`:'';

    const metricDetail={
      max:`<div><span style="font-family:var(--fm);font-size:22px;font-weight:600;color:var(--green)">${latest.maxW}lbs</span> max this session · All-time: <span style="color:var(--amber);font-weight:600">${allTime.maxW}lbs</span></div>`,
      best:`<div><span style="font-family:var(--fm);font-size:22px;font-weight:600;color:var(--green)">${latest.bestSet.w}lbs × ${latest.bestSet.r} reps</span> best set · Vol: ${latest.bestSetVol}<br>All-time best set vol: <span style="color:var(--amber);font-weight:600">${allTime.bestSetVol}</span></div>`,
      vol:`<div><span style="font-family:var(--fm);font-size:22px;font-weight:600;color:var(--green)">${latest.totalVol}</span> total vol · All-time: <span style="color:var(--amber);font-weight:600">${allTime.totalVol}</span></div>`
    }[SEL_METRIC];

    // Latest session breakdown
    const setsBreakdown=latest.sets.filter(s=>s.w||s.r).map(s=>`${s.w}×${s.r} <span style="color:var(--t3);font-size:10px">(${s.w*s.r})</span>`).join('  ');

    summary.innerHTML=`<div style="border-top:1px solid var(--bdr);padding-top:10px">
      ${metricDetail}
      <div style="font-size:11px;color:var(--t2);margin-top:6px;font-family:var(--fm)">${setsBreakdown}</div>
      <div style="font-size:11px;margin-top:4px">${diffStr}</div>
      ${brandNote}
    </div>`;
  } else if(summary){summary.innerHTML='';}

  drawLine(canvas,vals,dates,'var(--green)',170);
}

// ═══════════════════════ CHARTS ═══════════════════════
function drawLine(canvas,vals,labels,color,H){
  if(!canvas)return;const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const W=canvas.parentElement.clientWidth-28,dpr=window.devicePixelRatio||1;
  canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  if(vals.length<2){ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='12px Barlow';ctx.textAlign='center';ctx.fillText('Log more sessions to see progress',W/2,H/2);return;}
  const pad={t:14,r:12,b:26,l:36};const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const minV=Math.min(...vals)*0.95,maxV=Math.max(...vals)*1.05;
  const px=i=>pad.l+(i/(vals.length-1))*gW;const py=v=>pad.t+gH-((v-minV)/(maxV-minV))*gH;
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)';ctx.lineWidth=1;
  for(let i=0;i<=3;i++){const y=pad.t+(i/3)*gH;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='9px JetBrains Mono';ctx.textAlign='right';ctx.fillText(Math.round(maxV-(i/3)*(maxV-minV)),pad.l-5,y+3);}
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+gH);grad.addColorStop(0,isDark?'rgba(61,219,130,0.2)':'rgba(20,168,92,0.15)');grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(px(0),py(vals[0]));vals.forEach((v,i)=>{if(i>0)ctx.lineTo(px(i),py(v));});ctx.lineTo(px(vals.length-1),pad.t+gH);ctx.lineTo(px(0),pad.t+gH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(px(0),py(vals[0]));vals.forEach((v,i)=>{if(i>0)ctx.lineTo(px(i),py(v));});ctx.strokeStyle=color;ctx.lineWidth=2.2;ctx.lineJoin='round';ctx.stroke();
  vals.forEach((v,i)=>{ctx.beginPath();ctx.arc(px(i),py(v),3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.beginPath();ctx.arc(px(i),py(v),2,0,Math.PI*2);ctx.fillStyle=isDark?'#0C0C0F':'#FFFFFF';ctx.fill();});
  ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='9px Barlow';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(vals.length/5));vals.forEach((_,i)=>{if(i%step===0||i===vals.length-1)ctx.fillText(labels[i]||'',px(i),H-6);});
}

function drawBar(canvas,vals,labels,H){
  if(!canvas||!vals.length)return;const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const W=canvas.parentElement.clientWidth-28,dpr=window.devicePixelRatio||1;
  canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  const pad={t:10,r:10,b:22,l:10};const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const maxV=Math.max(...vals,1);const sp=gW/vals.length;const bw=Math.min(sp-4,28);
  vals.forEach((v,i)=>{const bh=(v/maxV)*gH;const x=pad.l+i*sp+sp/2-bw/2;
    ctx.fillStyle=isDark?'rgba(45,212,192,0.45)':'rgba(15,158,146,0.4)';ctx.beginPath();ctx.roundRect(x,pad.t+gH-bh,bw,bh,3);ctx.fill();
    ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='8px Barlow';ctx.textAlign='center';ctx.fillText(labels[i]||'',x+bw/2,H-4);
    if(v>0){ctx.fillStyle=isDark?'#8F8FA3':'#5A5A72';ctx.font='8px JetBrains Mono';ctx.fillText(v>=1000?Math.round(v/100)/10+'k':v,x+bw/2,pad.t+gH-bh-3);}
  });
}

function renderSkills(){const wrap=document.getElementById('skillsWrap');if(!wrap)return;wrap.innerHTML=S.skills.map(sk=>{const logs=S.skillLogs[sk.id]||[];const latest=logs[0];const pct=Math.round((sk.done/sk.milestones.length)*100);return `<div class="skillCard"><div class="skillTop"><div class="skillIco" style="background:${sk.color}20">${sk.icon}</div><div style="flex:1"><div class="sName">${sk.name}</div><div class="sCur">${latest?.value||sk.current}</div></div><div style="font-family:var(--fm);font-size:20px;font-weight:600;color:${sk.color}">${pct}%</div></div><div class="progTrack"><div class="progFill" style="width:${pct}%;background:${sk.color}"></div></div><div class="milestones">${sk.milestones.map((m,i)=>`<span class="ms ${i<sk.done?'done':i===sk.done?'next':'fut'}" onclick="advMs('${sk.id}',${i})">${m}</span>`).join('')}</div><button class="skillLogBtn" onclick="openSkillLog('${sk.id}')">+ Log Progress</button></div>`;}).join('');}

function advMs(id,idx){const sk=S.skills.find(s=>s.id===id);sk.done=Math.max(sk.done,idx+1);save();document.querySelectorAll('.milestones .ms').forEach((el,i)=>{el.className=`ms ${i<sk.done?'done':i===sk.done?'next':'fut'}`;});toast('Milestone unlocked 🎯');}
function openSkillLog(id){const sk=S.skills.find(s=>s.id===id);const logs=S.skillLogs[id]||[];document.getElementById('sheetBody').innerHTML=`<div class="shTitle">${sk.icon} ${sk.name}</div><div class="shSub">Log today's best effort</div><div class="field"><div class="fLbl">Current best</div><input class="fInp" id="sk-val" placeholder="${logs[0]?.value||sk.current}"></div><div class="field"><div class="fLbl">Notes</div><input class="fInp" id="sk-note" placeholder="What went well, what to improve..."></div><div class="lbl" style="margin-top:12px">Tap to advance milestone</div><div class="milestones" style="margin-bottom:16px">${sk.milestones.map((m,i)=>`<span class="ms ${i<sk.done?'done':i===sk.done?'next':'fut'}" onclick="advMs('${id}',${i})" style="cursor:pointer">${m}</span>`).join('')}</div><button class="saveBtn" onclick="saveSkillLog('${id}')">SAVE</button>`;openOverlay();}
function saveSkillLog(id){const val=document.getElementById('sk-val').value;const note=document.getElementById('sk-note').value;if(!S.skillLogs[id])S.skillLogs[id]=[];S.skillLogs[id].unshift({date:today(),value:val||'Logged',note});save();closeOverlay();toast('Skill logged!');setTimeout(renderSkills,100);}

function renderHistory(){

    <button onclick="exportBackup()" style="flex:1;padding:10px;border-radius:var(--rsm);background:var(--gd);border:1px solid var(--green);font-size:12px;font-weight:700;color:var(--green)">⬇ Export Backup</button>
    <button onclick="document.getElementById('importFile').click()" style="flex:1;padding:10px;border-radius:var(--rsm);background:var(--bd);border:1px solid var(--blue);font-size:12px;font-weight:700;color:var(--blue)">⬆ Import Backup</button>

  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

    <div style="font-family:var(--fm);font-size:10px;color:var(--t3);padding:3px 8px;border-radius:20px;background:var(--bg3);white-space:nowrap;margin-left:10px">v${APP_VERSION}</div>
  </div>`;

  if(!S.history.length){c.innerHTML=backupBar+`<div class="empty"><div class="emIco">📋</div><div class="emT">No sessions yet</div><div class="emS">Complete your first workout to see it here.</div></div>`;return;}
  const cols={sat:'var(--green)',sun:'var(--blue)',mon:'var(--amber)',tue:'var(--purple)',wed:'var(--blue)',thu:'var(--amber)',fri:'var(--t3)'};
  const weeks={};S.history.forEach(h=>{const wk=h.week||wkKey(h.date);if(!weeks[wk])weeks[wk]=[];weeks[wk].push(h);});
  const sorted=Object.keys(weeks).sort((a,b)=>new Date(b)-new Date(a));

      const col=cols[h.dayId]||'var(--green)';
      const sets=h.exercises?.reduce((t,e)=>t+(e.sets?.filter(s=>s.weight||s.reps).length||0),0)||0;
      const key=wk+'_'+idx;
      return `<div class="histItem">

          <div class="histDot" style="background:${col}"></div>
          <div class="histInfo">
            <div class="histTitle">${h.name.replace(/—.*/,'').trim()}</div>

          </div>

            <div class="histBadge">${sets} sets</div>

          </div>
        </div>
        <div class="histDetail" id="hd-${key}">
          ${h.exercises?.map(ex=>{
            const sb=ex.sets.filter(s=>s.weight||s.reps).map(s=>`${s.weight||'—'}×${s.reps||'—'}`).join(' · ');
            const rpe=ex.rpe?` · RPE ${ex.rpe}`:'';
            const brand=ex.brand?` · <span style="color:var(--teal)">${ex.brand}</span>`:'';
            return `<div class="hEx"><div class="hExName">${ex.name}${rpe}${brand}</div><div class="hExSets">${sb}</div></div>`;

    }).join('')}`;
  }).join('');
}

function togHist(key){const d=document.getElementById('hd-'+key);if(d)d.classList.toggle('on');}
function delSess(id){S.history=S.history.filter(h=>h.id!==id);save();renderHistory();renderHome();toast('Session deleted');}

function pickBrand(exId, val){
  if(val === BRAND_CUSTOM_VAL){
    // Toggle custom input visible, clear preset selection
    const otherBtn = document.getElementById('bc-other-'+exId);
    const customWrap = document.getElementById('bcw-'+exId);
    const wasOn = otherBtn?.classList.contains('on');
    // Deselect all presets
    document.querySelectorAll(`#bp-${exId} .brandChip`).forEach(b=>b.classList.remove('on'));
    if(!wasOn){
      otherBtn?.classList.add('on');
      customWrap?.classList.add('on');
      setTimeout(()=>document.getElementById('bci-'+exId)?.focus(),100);
    } else {
      customWrap?.classList.remove('on');
      setBrand(exId,'');
    }
    return;
  }
  // Select a preset — deselect all, select this one, hide custom input
  document.querySelectorAll(`#bp-${exId} .brandChip`).forEach(b=>b.classList.remove('on'));
  document.getElementById('bcw-'+exId)?.classList.remove('on');
  const btn = document.querySelector(`#bp-${exId} .brandChip[onclick*="'${val}'"]`);

  setBrand(exId, val);

// ═══════════════════════ BACKUP / RESTORE ═══════════════════════
function exportBackup(){
  const backup={
    exportedAt:new Date().toISOString(),
    version:'lift_v5',
    data:S,
    program:PROG
  };
  const json=JSON.stringify(backup,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const dateStr=new Date().toLocaleDateString('en-US').replace(/\//g,'-');
  a.href=url;a.download=`lift-backup-${dateStr}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Backup downloaded ✓');
}

function importBackup(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const backup=JSON.parse(e.target.result);
      if(!backup.data||!backup.version){toast('Invalid backup file');return;}
      const d=backup.data;
      // Merge strategy: new records win on id conflict, existing preserved
      const mergeArr=(existing,incoming,key='id')=>{
        const map=new Map(existing.map(x=>[x[key],x]));
        incoming.forEach(x=>{if(!map.has(x[key]))map.set(x[key],x);});
        return [...map.values()];
      };
      S.history=mergeArr(S.history,d.history||[]);
      S.diet=mergeArr(S.diet,d.diet||[]);
      S.sleep=mergeArr(S.sleep,d.sleep||[],'date');
      S.bodyWeight=mergeArr(S.bodyWeight,d.bodyWeight||[],'date');
      S.steps=mergeArr(S.steps,d.steps||[],'date');
      S.caffeine=mergeArr(S.caffeine,d.caffeine||[],'date');
      S.savedMeals=d.savedMeals||S.savedMeals||[];
      S.skillLogs=d.skillLogs||S.skillLogs;
      S.skills=d.skills||S.skills;
      if(backup.program)PROG=backup.program;
      save();saveProg();
      toast('Backup restored ✓');
      renderHome();renderHistory();
    }catch(err){toast('Could not read backup file');}
  };
  reader.readAsText(file);
  event.target.value='';
}

function togEd(id){const el=document.getElementById(id);if(el)el.classList.toggle('on');}

function addEx(dayId,blockId){document.getElementById('sheetBody').innerHTML=`<div class="shTitle">Add Exercise</div><div class="shSub">${dayId} · ${blockId}</div><div class="field"><div class="fLbl">Exercise Name</div><input class="fInp" id="ne-name" placeholder="e.g. Cable Fly"></div><div class="r2" style="margin-bottom:12px"><div><div class="fLbl">Sets × Reps</div><input class="fInp" id="ne-rx" placeholder="3 × 10-12"></div><div><div class="fLbl">Default Sets</div><input class="fInp" id="ne-sets" type="number" placeholder="3"></div></div><div class="r2" style="margin-bottom:12px"><div><div class="fLbl">RPE</div><input class="fInp" id="ne-rpe" placeholder="RPE 8"></div><div><div class="fLbl">Rest</div><input class="fInp" id="ne-rest" placeholder="90 sec"></div></div><div class="field"><div class="fLbl">Muscle Target</div><input class="fInp" id="ne-muscle" placeholder="e.g. Lats"></div><div class="field"><div class="fLbl">Coaching Note</div><textarea class="fInp" id="ne-note" rows="2" placeholder="Form cue or tip..."></textarea></div><button class="saveBtn" onclick="saveNewEx('${dayId}','${blockId}')">ADD EXERCISE</button>`;}

function saveNewEx(dayId,blockId){const name=document.getElementById('ne-name').value.trim();if(!name){toast('Enter a name');return;}const day=PROG.days.find(d=>d.id===dayId);const block=day?.blocks.find(b=>b.id===blockId);if(!block)return;const id=name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now();block.exercises.push({id,name,rx:document.getElementById('ne-rx').value||'3 × 10',rpe:document.getElementById('ne-rpe').value||'RPE 8',rest:document.getElementById('ne-rest').value||'90 sec',note:document.getElementById('ne-note').value||'',muscle:document.getElementById('ne-muscle').value||'',sets:parseInt(document.getElementById('ne-sets').value)||3});saveProg();closeOverlay();toast('Exercise added ✓');renderHome();}

function editEx(dayId,blockId,exId){const day=PROG.days.find(d=>d.id===dayId);const block=day?.blocks.find(b=>b.id===blockId);const ex=block?.exercises.find(e=>e.id===exId);if(!ex)return;document.getElementById('sheetBody').innerHTML=`<div class="shTitle">Edit Exercise</div><div class="field"><div class="fLbl">Name</div><input class="fInp" id="ee-name" value="${ex.name}"></div><div class="r2" style="margin-bottom:12px"><div><div class="fLbl">Sets × Reps</div><input class="fInp" id="ee-rx" value="${ex.rx}"></div><div><div class="fLbl">Default Sets</div><input class="fInp" id="ee-sets" type="number" value="${ex.sets}"></div></div><div class="r2" style="margin-bottom:12px"><div><div class="fLbl">RPE</div><input class="fInp" id="ee-rpe" value="${ex.rpe}"></div><div><div class="fLbl">Rest</div><input class="fInp" id="ee-rest" value="${ex.rest}"></div></div><div class="field"><div class="fLbl">Muscle</div><input class="fInp" id="ee-muscle" value="${ex.muscle}"></div><div class="field"><div class="fLbl">Note</div><textarea class="fInp" id="ee-note" rows="2">${ex.note}</textarea></div><button class="saveBtn" onclick="saveEditEx('${dayId}','${blockId}','${exId}')">SAVE CHANGES</button>`;}

function saveEditEx(dayId,blockId,exId){const day=PROG.days.find(d=>d.id===dayId);const block=day?.blocks.find(b=>b.id===blockId);const ex=block?.exercises.find(e=>e.id===exId);if(!ex)return;ex.name=document.getElementById('ee-name').value;ex.rx=document.getElementById('ee-rx').value;ex.sets=parseInt(document.getElementById('ee-sets').value)||3;ex.rpe=document.getElementById('ee-rpe').value;ex.rest=document.getElementById('ee-rest').value;ex.muscle=document.getElementById('ee-muscle').value;ex.note=document.getElementById('ee-note').value;saveProg();closeOverlay();toast('Updated ✓');renderHome();}
function removeEx(dayId,blockId,exId){const day=PROG.days.find(d=>d.id===dayId);const block=day?.blocks.find(b=>b.id===blockId);if(!block)return;block.exercises=block.exercises.filter(e=>e.id!==exId);saveProg();closeOverlay();toast('Removed');renderHome();}
function resetProg(){PROG=JSON.parse(JSON.stringify(DEFAULT_PROG));saveProg();closeOverlay();toast('Program reset');renderHome();}

// ═══════════════════════ OVERLAY / TOAST ═══════════════════════
function openOverlay(){document.getElementById('overlay').classList.add('on');}
function closeOverlay(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('on');
}
function toast(msg){const t=document.getElementById('toastEl');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000);}

// ═══════════════════════ INIT ═══════════════════════
load();
renderHome();
document.getElementById('btnEdit').style.display='flex';
</script>
</body>
</html>
