<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFT">
<title>LIFT</title>
<style>
/* ── TOKENS ───────────────────────────────────────────────── */
:root{
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  /* Type — system stack = native iOS rendering, no network needed */
  --fd:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
  --fb:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
  --fm:'JetBrains Mono','SF Mono',monospace;
  --r:16px;--rsm:10px;--rxs:7px;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}

/* ── DARK PALETTE (default) ─────────────────────────────── */
@media(prefers-color-scheme:dark){:root{
  /* Surfaces */
  --bg:#09090C;
  --bg2:#111116;
  --bg3:#18181F;
  --bg4:#22222B;
  --bg5:#2A2A35;
  /* Borders */
  --bdr:rgba(255,255,255,.06);
  --bdr2:rgba(255,255,255,.1);
  /* Text */
  --t1:#F2F2F7;
  --t2:#98989F;
  --t3:#48484F;
  /* Accents */
  --green:#30D158;--gd:rgba(48,209,88,.12);--gb:rgba(48,209,88,.06);
  --blue:#0A84FF;--bd:rgba(10,132,255,.12);--bb:rgba(10,132,255,.06);
  --amber:#FFD60A;--ad:rgba(255,214,10,.12);--ab:rgba(255,214,10,.06);
  --red:#FF453A;--rd:rgba(255,69,58,.12);
  --purple:#BF5AF2;--pd:rgba(191,90,242,.12);
  --teal:#5AC8FA;--td:rgba(90,200,250,.12);
  --orange:#FF9F0A;--od:rgba(255,159,10,.12);
  /* Shadows */
  --sh:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
  --sh-sm:0 1px 2px rgba(0,0,0,.3);
  --sh-lg:0 8px 32px rgba(0,0,0,.5);
  /* Glass */
  --glass:rgba(17,17,22,.8);
  --glass-border:rgba(255,255,255,.08);
}}

/* ── LIGHT PALETTE ───────────────────────────────────────── */
@media(prefers-color-scheme:light){:root{
  --bg:#F2F2F7;
  --bg2:#FFFFFF;
  --bg3:#F2F2F7;
  --bg4:#E5E5EA;
  --bg5:#D1D1D6;
  --bdr:rgba(0,0,0,.06);
  --bdr2:rgba(0,0,0,.12);
  --t1:#1C1C1E;
  --t2:#6C6C70;
  --t3:#AEAEB2;
  --green:#34C759;--gd:rgba(52,199,89,.12);--gb:rgba(52,199,89,.06);
  --blue:#007AFF;--bd:rgba(0,122,255,.12);--bb:rgba(0,122,255,.06);
  --amber:#FF9500;--ad:rgba(255,149,0,.12);--ab:rgba(255,149,0,.06);
  --red:#FF3B30;--rd:rgba(255,59,48,.12);
  --purple:#AF52DE;--pd:rgba(175,82,222,.12);
  --teal:#32ADE6;--td:rgba(50,173,230,.12);
  --orange:#FF9500;--od:rgba(255,149,0,.12);
  --sh:0 1px 3px rgba(0,0,0,.08),0 2px 8px rgba(0,0,0,.06);
  --sh-sm:0 1px 2px rgba(0,0,0,.06);
  --sh-lg:0 4px 20px rgba(0,0,0,.12);
  --glass:rgba(242,242,247,.85);
  --glass-border:rgba(0,0,0,.08);
}}

/* ── RESET ───────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
input,textarea{font-family:inherit;-webkit-appearance:none;appearance:none}
button{font-family:inherit;cursor:pointer;background:none;border:none;-webkit-appearance:none}
textarea{resize:none}
a{color:var(--blue);text-decoration:none}

/* ── LAYOUT ──────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* Top bar — frosted glass */
.topbar{
  padding:calc(var(--sat) + 12px) 18px 12px;
  display:flex;align-items:center;gap:10px;
  background:var(--glass);
  border-bottom:1px solid var(--glass-border);
  flex-shrink:0;z-index:20;
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
}
.topbar-title{
  font-family:var(--fd);font-size:28px;font-weight:700;
  letter-spacing:-.4px;flex:1;
}
.iBtn{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  color:var(--t2);
  transition:transform .15s var(--ease),background .15s;
  flex-shrink:0;
}
.iBtn:active{transform:scale(.88);background:var(--bg4)}

/* Scroller */
.scroller{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scroller::-webkit-scrollbar{display:none}

/* Bottom nav — frosted glass */
.bottomnav{
  display:flex;
  background:var(--glass);
  border-top:1px solid var(--glass-border);
  padding:10px 0 calc(var(--sab) + 8px);
  flex-shrink:0;
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
}
.navBtn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:2px 0;color:var(--t3);
  transition:color .15s var(--ease),transform .1s var(--ease);
}
.navBtn.on{color:var(--blue)}
.navBtn:active{transform:scale(.9)}
.navBtn svg{width:23px;height:23px;stroke-width:1.6;fill:none;stroke:currentColor}
.navLbl{font-size:9px;font-weight:600;letter-spacing:.02em}

/* Screens */
.screen{display:none;padding:14px 16px calc(20px + var(--sab))}
.screen.on{display:block}

/* ── SHARED COMPONENTS ───────────────────────────────────── */
/* Section label */
.lbl{
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--t3);margin:24px 0 9px;
}
.lbl:first-child{margin-top:4px}

/* Card */
.card{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);
  box-shadow:var(--sh);overflow:hidden;margin-bottom:10px;
}
.cRow{
  display:flex;align-items:center;gap:10px;
  padding:13px 15px;border-bottom:1px solid var(--bdr);
}
.cRow:last-child{border-bottom:none}

/* Pill */
.pill{
  font-size:9px;font-weight:700;padding:2px 7px;
  border-radius:20px;letter-spacing:.05em;
  text-transform:uppercase;white-space:nowrap;
}

/* Chip */
.chip{
  padding:6px 13px;border-radius:20px;
  font-size:12px;font-weight:600;white-space:nowrap;
  border:1px solid var(--bdr2);
  background:var(--bg3);color:var(--t2);
  transition:all .15s var(--ease);
}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip:active{transform:scale(.93);opacity:.8}

/* Horizontal scroll row */
.scrollRow{
  display:flex;gap:6px;overflow-x:auto;
  padding-bottom:2px;scrollbar-width:none;
}
.scrollRow::-webkit-scrollbar{display:none}

/* ── DAY CARDS ───────────────────────────────────────────── */
.dayCard{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);
  box-shadow:var(--sh);margin-bottom:10px;
  overflow:hidden;
  transition:transform .12s var(--spring),box-shadow .12s;
  position:relative;
}
.dayCard:active{transform:scale(.978);box-shadow:var(--sh-sm)}

/* Left accent bar */
.dayCard::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent-color,var(--t3));
  border-radius:3px 0 0 3px;
}
.dayCard.today-card{box-shadow:0 0 0 1.5px var(--blue),var(--sh)}

.dcTop{
  display:flex;align-items:center;gap:13px;
  padding:14px 15px 14px 18px;cursor:pointer;
}
.dDot{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:13px;font-weight:700;
  letter-spacing:.5px;flex-shrink:0;
}
.dInfo{flex:1;min-width:0}
.dName{font-size:15px;font-weight:600;letter-spacing:-.2px}
.dSub{font-size:12px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.dMeta{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.dSets{
  font-family:var(--fm);font-size:11px;color:var(--t2);
  background:var(--bg3);padding:2px 7px;border-radius:5px;
}
.dDur{font-size:11px;color:var(--t3)}

.todayChip{
  font-size:9px;font-weight:700;color:var(--blue);
  background:var(--bd);padding:3px 8px;border-radius:20px;
  letter-spacing:.05em;text-transform:uppercase;
}
.doneChip{
  font-size:9px;font-weight:700;color:var(--green);
  background:var(--gd);padding:3px 8px;border-radius:20px;
}

.dcChips{padding:0 15px 11px 18px;display:flex;gap:5px}
.dcCardio{
  padding:8px 15px 8px 18px;
  font-size:12px;color:var(--purple);
  border-top:1px solid var(--bdr);background:var(--pd);
  display:flex;align-items:center;gap:5px;
}

/* ── WEEK BAR ────────────────────────────────────────────── */
.weekBar{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);padding:15px;
  margin-bottom:10px;box-shadow:var(--sh);
}
.wbTop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.wbTitle{font-family:var(--fd);font-size:19px;font-weight:700;letter-spacing:-.3px}
.wbSub{font-family:var(--fm);font-size:12px;color:var(--t2)}
.wDays{display:flex;gap:4px}
.wDay{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wDot{
  width:30px;height:30px;border-radius:50%;
  background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--t3);
  transition:all .2s var(--spring);
}
.wDot.done{background:var(--green);color:#fff}
.wDot.today{box-shadow:0 0 0 2px var(--blue);color:var(--blue)}
.wDot.done.today{box-shadow:0 0 0 2px var(--green)}
.wLbl{font-size:8px;color:var(--t3);font-weight:600;letter-spacing:.04em}

/* ── WORKOUT SCREEN ──────────────────────────────────────── */
.wHero{padding:20px 16px 16px;border-bottom:1px solid var(--bdr)}
.wHDay{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--t3);margin-bottom:4px;
}
.wHTitle{
  font-family:var(--fd);font-size:32px;font-weight:700;
  letter-spacing:-.5px;line-height:1;
}
.wHSub{font-size:13px;color:var(--t2);margin-top:5px}
.wStats{display:flex;gap:16px;margin-top:14px}
.wStat{display:flex;flex-direction:column;gap:1px}
.wSV{font-family:var(--fm);font-size:16px;font-weight:600}
.wSL{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.07em;text-transform:uppercase}

.blockCard{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);
  margin:10px 14px 0;overflow:hidden;box-shadow:var(--sh);
}
.blockHdr{
  display:flex;align-items:center;gap:9px;
  padding:11px 14px;border-bottom:1px solid var(--bdr);
  background:var(--bg3);
}
.blockNum{
  width:22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fm);font-size:10px;font-weight:700;flex-shrink:0;
}
.blockName{font-size:13px;font-weight:600;flex:1;letter-spacing:-.1px}

.exWrap{padding:12px 14px;border-top:1px solid var(--bdr)}
.exTop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exName{font-size:15px;font-weight:600;letter-spacing:-.2px;flex:1}
.exRx{
  font-family:var(--fm);font-size:12px;font-weight:600;
  color:var(--green);white-space:nowrap;
  background:var(--gb);padding:2px 7px;border-radius:5px;
}
.exNote{font-size:12px;color:var(--t2);margin-top:4px;line-height:1.5}
.exRpe{font-size:11px;color:var(--t3);margin-top:2px}
.exMuscle{
  font-size:11px;color:var(--blue);font-weight:600;
  margin-top:3px;
}
.exLast{
  font-size:11px;color:var(--t3);margin-top:4px;
  font-family:var(--fm);
}

/* Machine picker */
.machSel{
  margin-top:9px;background:var(--bg3);
  border-radius:var(--rsm);padding:9px 11px;
  border:1px solid var(--bdr);
}
.machSelLbl{
  font-size:9px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--t3);margin-bottom:6px;
}
.machChips{display:flex;gap:4px;flex-wrap:wrap}
.machChip{
  font-size:11px;font-weight:600;padding:4px 9px;
  border-radius:20px;border:1px solid var(--bdr2);
  background:var(--bg2);color:var(--t2);
  transition:all .12s var(--ease);white-space:nowrap;
}
.machChip.on{background:var(--teal);color:var(--bg);border-color:var(--teal)}
.machChip:active{transform:scale(.92)}

/* Sets */
.setsWrap{margin-top:10px}
.setRow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.setLbl{
  font-family:var(--fm);font-size:10px;color:var(--t3);
  width:20px;flex-shrink:0;text-align:center;
}
.inp{
  flex:1;background:var(--bg3);
  border:1px solid var(--bdr2);
  border-radius:var(--rsm);
  padding:9px 6px;
  font-family:var(--fm);font-size:15px;font-weight:500;
  color:var(--t1);text-align:center;
  outline:none;
  transition:border-color .15s,background .15s;
  min-width:0;
}
.inp:focus{border-color:var(--blue);background:var(--bb)}
.inp::placeholder{color:var(--t3);font-size:12px}

.setOk{
  width:32px;height:32px;border-radius:50%;
  border:1.5px solid var(--bdr2) !important;
  background:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--t3);font-size:14px;flex-shrink:0;
  transition:all .15s var(--spring);
}
.setOk.done{
  background:var(--green);border-color:var(--green) !important;
  color:#fff;transform:scale(1.05);
}
.setOk:active{transform:scale(.88) !important}

.addSet{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;color:var(--blue);
  padding:4px 0;margin-top:3px;
}

.rpeWrap{display:flex;gap:3px;margin-top:9px;align-items:center}
.rpeLbl{
  font-size:9px;color:var(--t3);font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;width:28px;flex-shrink:0;
}
.rpeB{
  flex:1;padding:5px 2px;border-radius:7px;
  border:1px solid var(--bdr2);background:var(--bg3);
  font-family:var(--fm);font-size:11px;font-weight:600;color:var(--t2);
  text-align:center;transition:all .12s var(--ease);
}
.rpeB.on{background:var(--amber);border-color:var(--amber);color:var(--bg)}
.rpeB:active{transform:scale(.88)}

.noteInp{
  width:100%;background:var(--bg3);
  border:1px solid var(--bdr);
  border-radius:var(--rsm);padding:9px 11px;
  font-size:13px;color:var(--t1);outline:none;
  min-height:56px;line-height:1.5;margin-top:8px;
  transition:border-color .15s;
}
.noteInp:focus{border-color:var(--blue)}
.noteInp::placeholder{color:var(--t3)}

/* Overload flags */
.poFlag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;padding:3px 9px;
  border-radius:20px;background:var(--gd);color:var(--green);
  letter-spacing:.04em;margin-top:5px;text-transform:uppercase;
}
.poFlagAmber{background:var(--ad);color:var(--amber)}

/* History drawer */
.exHistBtn{
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;color:var(--blue);
  padding:5px 0 2px;margin-top:3px;
  background:none;border:none;
}
.exHistBtn svg{transition:transform .2s var(--ease)}
.exHistBtn.open svg{transform:rotate(180deg)}
.exHistDrawer{
  display:none;margin-top:8px;border-radius:var(--rsm);
  overflow:hidden;border:1px solid var(--bdr);
}
.exHistDrawer.on{display:block}
.ehdRow{
  display:grid;grid-template-columns:60px 1fr auto;
  gap:6px;align-items:start;padding:8px 10px;
  border-bottom:1px solid var(--bdr);background:var(--bg3);
}
.ehdRow:last-child{border-bottom:none}
.ehdRow.cur{background:var(--gb)}
.ehdDate{font-size:10px;color:var(--t3);font-family:var(--fm)}
.ehdSets{font-size:11px;color:var(--t1);font-family:var(--fm);line-height:1.8}
.ehdMax{font-size:11px;font-weight:700;font-family:var(--fm);text-align:right;white-space:nowrap}
.ehdTrend{font-size:9px;margin-top:2px;text-align:right}
.ehdHdr{
  display:grid;grid-template-columns:60px 1fr auto;
  gap:6px;padding:5px 10px;
  background:var(--bg4);border-bottom:1px solid var(--bdr);
}
.ehdHLbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}

/* Finish button */
.finBtn{
  width:100%;padding:16px;border-radius:var(--r);
  background:var(--green);
  font-family:var(--fd);font-size:20px;font-weight:700;
  letter-spacing:-.2px;color:#fff;
  transition:all .15s var(--spring);margin:16px 0 0;
  box-shadow:0 4px 16px rgba(48,209,88,.35);
}
.finBtn:active{transform:scale(.97);opacity:.9}

/* ── PROGRESS ────────────────────────────────────────────── */
.statGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.statTile{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);padding:15px;box-shadow:var(--sh);
}
.statV{
  font-family:var(--fd);font-size:36px;font-weight:700;
  letter-spacing:-.8px;line-height:1;
}
.statL{font-size:11px;color:var(--t2);font-weight:600;margin-top:4px}
.statS{font-size:11px;color:var(--t3);margin-top:2px}

.chartTile{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);padding:15px;
  box-shadow:var(--sh);margin-bottom:10px;
}
.ctTitle{
  font-size:13px;font-weight:600;margin-bottom:12px;
  display:flex;justify-content:space-between;align-items:center;
  letter-spacing:-.1px;
}
canvas{width:100% !important;display:block}
.wcGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.wcCell{background:var(--bg3);border-radius:var(--rsm);padding:11px}
.wcLbl{
  font-size:9px;color:var(--t3);font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;
}
.wcVal{font-family:var(--fm);font-size:18px;font-weight:600;margin-top:3px}
.wcDiff{font-size:11px;margin-top:2px;font-weight:600}

/* ── DIET ────────────────────────────────────────────────── */
.macroBW{margin-bottom:9px}
.mbTop{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.mbName{font-weight:600}
.mbVals{font-family:var(--fm);color:var(--t2)}
.mbTrack{height:5px;border-radius:3px;background:var(--bg4);overflow:hidden}
.mbFill{height:100%;border-radius:3px;transition:width .6s var(--ease)}

.mealRow{
  padding:12px 15px;border-bottom:1px solid var(--bdr);
  display:flex;align-items:flex-start;gap:10px;
}
.mealRow:last-child{border-bottom:none}
.mTime{font-family:var(--fm);font-size:10px;color:var(--t3);width:36px;flex-shrink:0;padding-top:2px}
.mInfo{flex:1;min-width:0}
.mName{font-size:13px;font-weight:600;letter-spacing:-.1px}
.mMacros{font-family:var(--fm);font-size:11px;color:var(--t2);margin-top:2px}
.mDel{color:var(--red);font-size:22px;padding:0 2px;line-height:1;opacity:.7}

/* Sleep */
.slLocBtns{display:flex;gap:7px;margin-top:7px}
.slLocBtn{
  flex:1;padding:9px 6px;border-radius:var(--rsm);
  border:1px solid var(--bdr2);background:var(--bg3);
  font-size:12px;font-weight:600;color:var(--t2);
  text-align:center;transition:all .15s var(--ease);
}
.slLocBtn.on{border-color:var(--purple);background:var(--pd);color:var(--purple)}
.slLocBtn:active{transform:scale(.95)}
.slQBtns{display:flex;gap:4px;margin-top:7px}
.slQBtn{
  flex:1;padding:7px 3px;border-radius:var(--rsm);
  border:1px solid var(--bdr2);background:var(--bg3);
  font-size:14px;text-align:center;
  transition:all .15s var(--ease);
}
.slQBtn.on{border-color:var(--amber);background:var(--ad)}
.slQBtn:active{transform:scale(.88)}

/* Meal search modal */
.mealSrch{position:relative;margin-bottom:10px}
.mealSrchInp{
  width:100%;background:var(--bg3);
  border:1px solid var(--bdr2);border-radius:12px;
  padding:11px 14px 11px 40px;
  font-size:15px;color:var(--t1);outline:none;
  transition:border-color .15s,background .15s;
}
.mealSrchInp:focus{border-color:var(--blue);background:var(--bb)}
.mealSrchIco{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3)}
.mealTabs{
  display:flex;gap:0;border-radius:var(--rsm);
  overflow:hidden;border:1px solid var(--bdr2);margin-bottom:12px;
  background:var(--bg3);padding:3px;border-radius:10px;gap:2px;
}
.mealTab{
  flex:1;padding:7px 4px;font-size:12px;font-weight:600;
  color:var(--t2);text-align:center;
  background:transparent;
  transition:all .15s var(--ease);border-radius:8px;
}
.mealTab.on{background:var(--bg2);color:var(--t1);box-shadow:var(--sh-sm)}
.mealItem{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:var(--rsm);background:var(--bg3);
  margin-bottom:6px;
  transition:background .12s;
}
.mealItem:active{background:var(--bg4)}
.mealItemName{font-size:13px;font-weight:600;flex:1;letter-spacing:-.1px}
.mealItemMacros{font-family:var(--fm);font-size:10px;color:var(--t2)}
.mealItemAdd{color:var(--green);font-size:22px;font-weight:700;padding:0 2px;flex-shrink:0}

/* ── HISTORY ─────────────────────────────────────────────── */
.histItem{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);margin-bottom:8px;
  overflow:hidden;box-shadow:var(--sh);
}
.histHdr{
  display:flex;align-items:center;gap:10px;
  padding:13px 15px;cursor:pointer;
  transition:background .1s;
}
.histHdr:active{background:var(--bg3)}
.histDot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.histInfo{flex:1;min-width:0}
.histTitle{font-size:14px;font-weight:600;letter-spacing:-.2px}
.histDate{font-size:12px;color:var(--t2);margin-top:1px}
.histBadge{
  font-family:var(--fm);font-size:11px;color:var(--t3);
  background:var(--bg3);padding:2px 7px;border-radius:5px;
}
.histDetail{
  display:none;padding:10px 15px 13px;
  border-top:1px solid var(--bdr);background:var(--bg3);
}
.histDetail.on{display:block}
.hEx{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:5px 0;border-bottom:1px solid var(--bdr);
}
.hEx:last-child{border-bottom:none}
.hExName{font-size:13px;font-weight:500;flex:1}
.hExSets{font-family:var(--fm);font-size:11px;color:var(--t2);text-align:right;max-width:55%}

/* ── SKILLS ──────────────────────────────────────────────── */
.skillCard{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);padding:15px;
  margin-bottom:10px;box-shadow:var(--sh);
}
.skillTop{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.skillIco{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.sName{font-size:15px;font-weight:600;letter-spacing:-.2px}
.sCur{font-size:12px;color:var(--t2);margin-top:1px}
.progTrack{
  height:4px;background:var(--bg4);border-radius:2px;
  overflow:hidden;margin-bottom:9px;
}
.progFill{height:100%;border-radius:2px;transition:width .7s var(--ease)}
.milestones{display:flex;gap:5px;flex-wrap:wrap}
.ms{
  font-size:10px;padding:3px 8px;border-radius:20px;
  font-weight:600;cursor:pointer;transition:all .12s;
}
.ms.done{background:var(--gd);color:var(--green)}
.ms.next{background:var(--ad);color:var(--amber)}
.ms.fut{background:var(--bg3);color:var(--t3)}
.ms:active{transform:scale(.92)}
.skillLogBtn{
  width:100%;padding:9px;border-radius:var(--rsm);
  background:var(--bg3);border:1px solid var(--bdr2);
  font-size:12px;font-weight:600;color:var(--blue);
  margin-top:11px;transition:all .12s;
}
.skillLogBtn:active{background:var(--bd)}

/* ── PROGRAM EDITOR ──────────────────────────────────────── */
.edSection{
  background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--bdr);margin-bottom:8px;
  overflow:hidden;box-shadow:var(--sh);
}
.edHdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 15px;border-bottom:1px solid var(--bdr);cursor:pointer;
  transition:background .1s;
}
.edHdr:active{background:var(--bg3)}
.edHdrTitle{font-size:14px;font-weight:600;letter-spacing:-.1px}
.edBody{padding:12px 14px;display:none}
.edBody.on{display:block}
.edExRow{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;border-bottom:1px solid var(--bdr);
}
.edExRow:last-of-type{border-bottom:none}
.edExName{flex:1;font-size:13px;font-weight:500}
.edExRx{font-family:var(--fm);font-size:11px;color:var(--t2)}
.addExBtn{
  width:100%;padding:9px;border-radius:var(--rsm);
  background:var(--bb);border:1px dashed var(--blue);
  font-size:12px;font-weight:600;color:var(--blue);
  margin-top:9px;transition:all .12s;
}
.addExBtn:active{background:var(--bd)}

/* ── OVERLAY / SHEET ─────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);
  z-index:100;display:none;align-items:flex-end;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.overlay.on{display:flex}

.sheet{
  width:100%;background:var(--bg2);
  border-radius:22px 22px 0 0;
  padding:14px 18px calc(var(--sab) + 24px);
  max-height:72vh;overflow-y:auto;
  animation:slideUp .3s var(--spring);
  border-top:1px solid var(--bdr2);
  box-shadow:0 -4px 40px rgba(0,0,0,.4);
}
.sheet::-webkit-scrollbar{display:none}
@keyframes slideUp{
  from{transform:translateY(100%);opacity:.8}
  to{transform:translateY(0);opacity:1}
}

.handle{width:32px;height:4px;background:var(--bg5);border-radius:2px;margin:0 auto}

.shTitle{
  font-family:var(--fd);font-size:24px;font-weight:700;
  letter-spacing:-.4px;margin-bottom:3px;
}
.shSub{font-size:13px;color:var(--t2);margin-bottom:14px;line-height:1.4}

/* Form elements */
.field{margin-bottom:12px}
.fLbl{
  font-size:11px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;color:var(--t3);margin-bottom:5px;
}
.fInp{
  width:100%;background:var(--bg3);
  border:1px solid var(--bdr2);border-radius:var(--rsm);
  padding:11px 13px;font-size:15px;color:var(--t1);
  outline:none;transition:border-color .15s,background .15s;
}
.fInp:focus{border-color:var(--blue);background:var(--bb)}
select.fInp{cursor:pointer}

.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Primary action button */
.saveBtn{
  width:100%;padding:14px;border-radius:var(--r);
  background:var(--blue);
  font-family:var(--fd);font-size:19px;font-weight:700;
  letter-spacing:-.1px;color:#fff;
  transition:all .15s var(--spring);margin-top:4px;
  box-shadow:0 4px 16px rgba(10,132,255,.35);
}
.saveBtn:active{transform:scale(.97);opacity:.9}

/* Toast */
.toast{
  position:fixed;bottom:calc(var(--sab) + 76px);
  left:50%;transform:translateX(-50%);
  background:var(--bg4);color:var(--t1);
  padding:9px 18px;border-radius:20px;
  font-size:13px;font-weight:600;
  z-index:200;opacity:0;
  transition:opacity .25s,transform .25s var(--spring);
  white-space:nowrap;pointer-events:none;
  border:1px solid var(--bdr2);
  box-shadow:var(--sh-lg);
  transform:translateX(-50%) translateY(6px);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty states */
.empty{text-align:center;padding:44px 20px;color:var(--t3)}
.emIco{font-size:38px;margin-bottom:12px}
.emT{font-size:16px;font-weight:600;color:var(--t2);margin-bottom:6px;letter-spacing:-.2px}
.emS{font-size:13px;line-height:1.6}

/* Utility */
.dangerBtn{color:var(--red);font-size:12px;font-weight:600;padding:4px 0;margin-top:9px;opacity:.8}
.delBtn{color:var(--red);font-size:18px;padding:0 2px;flex-shrink:0;opacity:.7}
</style>
</head>

// ═══ HELPERS ═══
function today(){return new Date().toLocaleDateString('en-US');}
function wkKey(ds){const d=ds?new Date(ds):new Date();const dy=d.getDay();const m=new Date(d);m.setDate(d.getDate()-(dy===0?6:dy-1));return m.toLocaleDateString('en-US');}
function isThisWk(ds){return wkKey(ds)===wkKey();}
function isLastWk(ds){const lw=new Date();lw.setDate(lw.getDate()-7);return wkKey(ds)===wkKey(lw.toLocaleDateString('en-US'));}
function fmtDate(ds){if(!ds)return'—';const d=new Date(ds);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',weekday:'short'});}
function toInputDate(ds){if(!ds)return'';const d=new Date(ds);if(isNaN(d))return'';const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const dy=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dy;}
function fromInputDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString('en-US');}
function wkNum(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+4-(d.getDay()||7));const y=new Date(d.getFullYear(),0,1);return Math.ceil((((d-y)/86400000)+1)/7);}
function countSets(day){return day.blocks.reduce((t,b)=>t+b.exercises.reduce((a,e)=>a+e.sets,0),0);}
function todaySteps(){const t=S.steps.find(s=>s.date===today());return t?t.steps:'';}
function cOf(c){const m={green:'var(--green)',blue:'var(--blue)',amber:'var(--amber)',purple:'var(--purple)',teal:'var(--teal)'};return m[c]||'var(--t3)';}
function bgOf(c){const m={green:'var(--gd)',blue:'var(--bd)',amber:'var(--ad)',purple:'var(--pd)',teal:'var(--td)'};return m[c]||'var(--bg3)';}

// BUG FIX: search history newest-first so we always get the most recent session
function getLastSession(exId){
  for(let i=0;i<S.history.length;i++){
    const ex=S.history[i].exercises?.find(e=>e.id===exId);
    if(ex)return ex;
  }
  return null;
}
function getLastMachineForEx(exId){
  for(let i=0;i<S.history.length;i++){
    const ex=S.history[i].exercises?.find(e=>e.id===exId);
    if(ex&&ex.machineId)return ex.machineId;
  }
  return null;
}
function fmtSets(sets){if(!sets?.length)return'—';return sets.filter(s=>s.weight||s.reps).slice(0,3).map(s=>(s.weight||'?')+'×'+(s.reps||'?')).join('  ');}

function renderWeekBar(){
  const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const shorts=['M','T','W','T','F','S','S'];
  const todayIdx=(new Date().getDay()+6)%7;
  const trained=new Set(S.history.filter(h=>isThisWk(h.date)).map(h=>new Date(h.date).toLocaleDateString('en-US',{weekday:'long'})));
  const twCnt=S.history.filter(h=>isThisWk(h.date)).length;
  const lwCnt=S.history.filter(h=>isLastWk(h.date)).length;
  const diff=twCnt-lwCnt;
  document.getElementById('weekBarWrap').innerHTML='<div class="weekBar"><div class="wbTop"><span class="wbTitle">Week '+wkNum()+'</span><span style="font-family:var(--fm);font-size:12px;color:'+(diff>=0?'var(--green)':'var(--red)')+'">'+twCnt+' sessions'+(diff!==0?' '+(diff>0?'↑'+diff:'↓'+Math.abs(diff))+' vs last wk':'')+'</span></div><div class="wDays">'+shorts.map((s,i)=>{const done=trained.has(days[i]);const isT=i===todayIdx;return'<div class="wDay"><div class="wDot '+(done?'done ':'')+(isT?'today':'')+'">'+( done?'✓':s)+'</div><div class="wLbl">'+days[i].slice(0,3)+'</div></div>';}).join('')+'</div></div>';
}

// ═══ MACHINE PICKER (filtered by movement type) ═══
// Infer a movement type from exercise name when none is explicitly set
// This lets existing/default exercises filter machines sensibly without manual tagging
function inferMovement(name){
  const n=name.toLowerCase();
  const rules=[
    [/leg curl/,'Leg Curl'],[/leg extension/,'Leg Extension'],[/squat|pendulum/,'Squat'],
    [/incline.*chest|incline.*press/,'Chest Press'],[/flat.*chest|flat.*press/,'Chest Press'],
    [/pec deck|chest fly|cable fly/,'Pec Deck'],[/shoulder press|overhead press/,'Shoulder Press'],
    [/lat pulldown|pulldown/,'Lat Pulldown'],[/seated row|machine row|single arm.*row/,'Row'],
    [/calf raise/,'Calf Raise'],[/adductor/,'Adductor'],[/abductor/,'Abductor'],
    [/pull-up|pull up|pullup/,'Pull-Up'],
    [/curl/,'Curl'],[/pushdown|tricep.*extension/,'Tricep'],[/face pull/,'Face Pull'],
  ];
  for(const[re,mv] of rules) if(re.test(n)) return mv;
  return '';
}
function exMovement(ex){ return ex.movement || inferMovement(ex.name) || ''; }

// Returns the pre-assigned default machine for a program exercise (stored on ex.defaultMachineId)
function getDefaultMachineId(ex){
  return ex.defaultMachineId || getLastMachineForEx(ex.id) || '';
}

// ═══ WORKOUT ═══
function openWorkout(dayId){
  const day=PROG.days.find(d=>d.id===dayId);if(!day||day.rest)return;
  CUR_DAY=day;
  const draft=loadDraft();
  const initWS=(ex)=>{
    const last=getLastSession(ex.id);
    const lastMachineId=getDefaultMachineId(ex);
    return{sets:Array.from({length:ex.sets},(_,i)=>({weight:last?.sets[i]?.weight||'',reps:last?.sets[i]?.reps||'',done:false})),rpe:null,note:'',machineId:lastMachineId,machineCustom:'',movement:exMovement(ex)};
  };
  if(draft&&draft.dayId===dayId){
    WS=draft.ws;
    day.blocks.forEach(b=>b.exercises.forEach(ex=>{if(!WS[ex.id])WS[ex.id]=initWS(ex);}));
  }else{
    WS={};
    day.blocks.forEach(b=>b.exercises.forEach(ex=>{WS[ex.id]=initWS(ex);}));
  }
  goScreen('workout',day.short);
  document.getElementById('workoutContent').innerHTML=buildWorkout(day);
  if(draft&&draft.dayId===dayId){
    const banner=document.createElement('div');
    banner.style.cssText='background:var(--gd);border-bottom:1px solid var(--green);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--green)';
    banner.innerHTML='<span>↩ Restored from earlier today</span><button onclick="this.parentElement.remove()" style="color:var(--green);font-size:16px">×</button>';
    document.getElementById('workoutContent').prepend(banner);
  }
}

// ═══ OVERLOAD + HISTORY DRAWER ═══
function getExHistory(exId,n){const out=[];for(let i=0;i<S.history.length&&out.length<n;i++){const h=S.history[i];const ex=h.exercises?.find(e=>e.id===exId);if(ex)out.push({date:h.date,sets:ex.sets,rpe:ex.rpe,machineId:ex.machineId,machineName:ex.machineName});}return out;}
function parseRxCeil(rx){const m=rx.match(/(\d+)\s*[-–]\s*(\d+)/);if(m)return parseInt(m[2]);const m2=rx.match(/×\s*(\d+)/);if(m2)return parseInt(m2[1]);return null;}
function getOverloadStatus(exId,rx){
  const hist=getExHistory(exId,4).filter(h=>h.date!==today());if(!hist.length)return null;
  const ceil=parseRxCeil(rx);if(!ceil)return null;
  const check=sess=>{const ws=sess.sets.filter(s=>s.weight||s.reps);if(!ws.length)return false;return ws.every(s=>parseInt(s.reps)>=ceil);};
  const l=check(hist[0]);const p=hist.length>=2&&check(hist[1]);
  if(l&&p)return'overload';if(l)return'approaching';return null;
}
function calcExMetrics(sessions){
  return sessions.map(s=>{
    const sets=s.sets.filter(x=>(parseFloat(x.weight)||0)>0||(parseInt(x.reps)||0)>0);
    const ws=sets.map(x=>({w:parseFloat(x.weight)||0,r:parseInt(x.reps)||0}));
    const maxW=Math.max(0,...ws.map(x=>x.w));
    const bestSet=ws.reduce((b,x)=>x.w*x.r>b.w*b.r?x:b,{w:0,r:0});
    const totalVol=ws.reduce((t,x)=>t+x.w*x.r,0);
    return{date:s.date,maxW,bestSet,bestSetVol:bestSet.w*bestSet.r,totalVol,sets:ws,machineId:s.machineId||'',machineName:s.machineName||''};
  });
}
function togHistDrawer(exId){
  const btn=document.getElementById('hb-'+exId);
  const drawer=document.getElementById('hd-'+exId);
  if(!btn||!drawer)return;
  if(drawer.classList.contains('on')){drawer.classList.remove('on');btn.classList.remove('open');return;}
  const hist=getExHistory(exId,5);
  if(!hist.length){drawer.innerHTML='<div style="padding:10px 12px;font-size:12px;color:var(--t3)">No history yet.</div>';drawer.classList.add('on');btn.classList.add('open');return;}
  const maxWts=hist.map(h=>{const ws=h.sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0);return ws.length?Math.max(...ws):0;});
  let rows='<div class="ehdHdr"><span class="ehdHLbl">Date</span><span class="ehdHLbl">Sets</span><span class="ehdHLbl">Max</span></div>';
  hist.forEach((h,i)=>{
    const ws=h.sets.filter(s=>s.weight||s.reps);
    const setStr=ws.map(s=>(s.weight||'—')+'×'+(s.reps||'—')).join('\n');
    const max=maxWts[i];const prev=maxWts[i+1];
    const trend=prev?(max>prev?'<span style="color:var(--green)">↑ +'+(Math.round((max-prev)*10)/10)+'</span>':max<prev?'<span style="color:var(--red)">↓ '+(Math.round((max-prev)*10)/10)+'</span>':'<span style="color:var(--t3)">→</span>'):'';
    const dd=new Date(h.date);const dateStr=(dd.getMonth()+1)+'/'+dd.getDate();
    const mStr=h.machineName?'<div style="font-size:9px;color:var(--teal);margin-top:1px">'+h.machineName+'</div>':'';
    const rpeStr=h.rpe?'<div style="font-size:9px;color:var(--amber);margin-top:1px">RPE '+h.rpe+'</div>':'';
    rows+='<div class="ehdRow'+(i===0?' cur':'')+'"><div><div class="ehdDate">'+dateStr+'</div>'+rpeStr+mStr+'</div><div class="ehdSets">'+setStr+'</div><div><div class="ehdMax">'+(max>0?max+'lbs':'—')+'</div><div class="ehdTrend">'+trend+'</div></div></div>';
  });
  drawer.innerHTML=rows;drawer.classList.add('on');btn.classList.add('open');
}

function macroBars(tot){
  return[{name:'Protein',val:tot.p,target:TARGETS.protein,unit:'g',col:'var(--blue)'},{name:'Carbs',val:tot.c,target:TARGETS.carbs,unit:'g',col:'var(--amber)'},{name:'Fat',val:tot.f,target:TARGETS.fat,unit:'g',col:'var(--purple)'},{name:'Calories',val:tot.cal,target:TARGETS.calories,unit:'kcal',col:'var(--green)'}]
    .map(b=>{const pct=Math.min(100,Math.round((b.val/b.target)*100));return'<div class="macroBW"><div class="mbTop"><span class="mbName">'+b.name+'</span><span class="mbVals">'+b.val+b.unit+' / '+b.target+b.unit+'</span></div><div class="mbTrack"><div class="mbFill" style="width:'+pct+'%;background:'+(b.val>b.target?'var(--red)':b.col)+'"></div></div></div>';}).join('');

function saveCaffeine(v){S.caffeine=S.caffeine.filter(c=>c.date!==today());const mg=parseInt(v)||0;if(mg>0)S.caffeine.unshift({date:today(),mg});save();toast(mg+'mg ☕');}
function delMeal(id){S.diet=S.diet.filter(m=>m.id!==id);save();renderDiet();toast('Meal removed');}
function saveSleepField(field,val){
  let sl=S.sleep.find(s=>s.date===today());
  if(!sl){sl={date:today(),hrs:0,loc:'',q:0};S.sleep.unshift(sl);}
  if(field==='hrs')sl.hrs=parseFloat(val)||0;
  else if(field==='loc')sl.loc=sl.loc===val?'':val;
  else if(field==='q')sl.q=sl.q===val?0:val;
  save();
  document.querySelectorAll('.slLocBtn').forEach(b=>{b.classList.toggle('on',b.textContent.includes('Home')&&sl.loc==='home'||b.textContent.includes('Travel')&&sl.loc==='travel');});
  document.querySelectorAll('.slQBtn').forEach((b,i)=>b.classList.toggle('on',sl.q===i+1));

function removeMBI(idx){_mealBuilderItems.splice(idx,1);renderMealModal();}

function openIngQty(ingId){
  const ing=S.ingredients.find(i=>i.id===ingId);if(!ing)return;
  const units=ing.units||['g'];

  // Build friendly unit descriptions for the subtitle
  const unitDesc=[];
  if(ing.each) unitDesc.push('1 each = '+ing.each+'g');
  if(ing.cup) unitDesc.push('1 cup = '+ing.cup+'g');
  if(ing.tbsp) unitDesc.push('1 tbsp = '+ing.tbsp+'g');
  if(ing.serving) unitDesc.push('1 serving = '+ing.serving+'g');
  if(ing.slice) unitDesc.push('1 slice = '+ing.slice+'g');
  if(ing.scoop) unitDesc.push('1 scoop = '+ing.scoop+'g');
  const sub=unitDesc.length?unitDesc.join(' · '):'Per 100g: '+ing.per100.p+'g P · '+ing.per100.c+'g C · '+ing.per100.f+'g F · '+ing.per100.cal+' kcal';

  document.getElementById('sheetBody').innerHTML=
    '<div class="shTitle">'+ing.name+'</div>'
    +'<div class="shSub">'+sub+'</div>'
    +'<div style="background:var(--bg3);border-radius:var(--rsm);padding:8px 12px;margin-bottom:12px;font-family:var(--fm);font-size:11px;color:var(--t3)">Per 100g: '+ing.per100.p+'g P · '+ing.per100.c+'g C · '+ing.per100.f+'g F · '+ing.per100.cal+' kcal</div>'
    +'<div class="lbl" style="margin-top:0">How much did you have?</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px">'
    +'<input class="fInp" id="iq-qty" type="number" inputmode="decimal" placeholder="e.g. 2" style="flex:2">'
    +'<select class="fInp" id="iq-unit" style="flex:1">'+units.map(u=>{
      const labels={g:'g',oz:'oz',cup:'cup',tbsp:'tbsp',each:'each',slice:'slice',scoop:'scoop',serving:'serving'};
      return'<option value="'+u+'">'+( labels[u]||u)+'</option>';
    }).join('')+'</select>'
    +'</div>'
    +'<div id="iq-preview" style="background:var(--gd);border-radius:var(--rsm);padding:10px 12px;font-size:13px;color:var(--t2);margin-bottom:14px;min-height:42px">Enter a quantity above to preview macros</div>'
    +'<button class="saveBtn" onclick="addIngToBuilder(\''+ingId+'\')">Add to Meal</button>'
    +'<button onclick="renderMealModal()" style="width:100%;padding:10px;font-size:13px;color:var(--t2);margin-top:8px">← Back</button>';
  document.getElementById('iq-qty').addEventListener('input',()=>updateIngPreview(ingId));
  document.getElementById('iq-unit').addEventListener('change',()=>updateIngPreview(ingId));
  setTimeout(()=>document.getElementById('iq-qty')?.focus(),200);
}
function updateIngPreview(ingId){
  const ing=S.ingredients.find(i=>i.id===ingId);if(!ing)return;
  const qty=parseFloat(document.getElementById('iq-qty').value)||0;
  const unit=document.getElementById('iq-unit').value;
  if(!qty){document.getElementById('iq-preview').innerHTML='Enter a quantity above to preview macros';return;}
  const g=toGrams(qty,unit,ing);const f=g/100;
  const p=Math.round(ing.per100.p*f*10)/10;
  const c=Math.round(ing.per100.c*f*10)/10;
  const ft=Math.round(ing.per100.f*f*10)/10;
  const cal=Math.round(ing.per100.cal*f);
  const unitLabel=qty===1?unit:(unit==='each'?'each':unit+'s');
  document.getElementById('iq-preview').innerHTML=
    '<div style="font-weight:700;color:var(--green);margin-bottom:4px">'+qty+' '+unitLabel+' = '+g+'g</div>'
    +'<div style="font-family:var(--fm);font-size:13px;color:var(--t1)">'+p+'g protein · '+c+'g carbs · '+ft+'g fat · '+cal+' kcal</div>';
}
function toGrams(qty,unit,ing){
  if(unit==='g')return qty;
  if(unit==='oz')return Math.round(qty*28.35);
  if(unit==='cup')return Math.round(qty*(ing.cup||240));
  if(unit==='tbsp')return Math.round(qty*(ing.tbsp||15));
  if(unit==='each')return Math.round(qty*(ing.each||100));
  if(unit==='slice')return Math.round(qty*(ing.slice||28));
  if(unit==='scoop')return Math.round(qty*(ing.scoop||30));
  if(unit==='serving')return Math.round(qty*(ing.serving||100));
  return qty;
}
function addIngToBuilder(ingId){
  const ing=S.ingredients.find(i=>i.id===ingId);if(!ing)return;
  const qty=parseFloat(document.getElementById('iq-qty').value)||0;
  const unit=document.getElementById('iq-unit').value;
  if(!qty){toast('Enter a quantity');return;}
  const g=toGrams(qty,unit,ing);const f=g/100;
  _mealBuilderItems.push({ingId,name:ing.name,qty:qty+unit,n:{p:Math.round(ing.per100.p*f*10)/10,c:Math.round(ing.per100.c*f*10)/10,f:Math.round(ing.per100.f*f*10)/10,cal:Math.round(ing.per100.cal*f)}});
  toast(ing.name+' added');_mealTab='ingredients';renderMealModal();
}
function logBuilderMeal(andSave){
  if(!_mealBuilderItems.length){toast('Add ingredients first');return;}
  const nameEl=document.getElementById('mb-name');
  const name=(nameEl?.value||'Meal '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})).trim();
  const tot=_mealBuilderItems.reduce((a,i)=>({p:a.p+i.n.p,c:a.c+i.n.c,f:a.f+i.n.f,cal:a.cal+i.n.cal}),{p:0,c:0,f:0,cal:0});
  const p=Math.round(tot.p);const c=Math.round(tot.c);const f=Math.round(tot.f);const cal=Math.round(tot.cal);
  const time=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  S.diet.unshift({id:Date.now(),date:_mealTargetDate,name,p,c,f,cal,time,note:'built from ingredients'});
  if(andSave&&!S.savedMeals.find(m=>m.name.toLowerCase()===name.toLowerCase())){S.savedMeals.push({name,p,c,f,cal});toast('Logged + saved 📌');}
  else{toast('Meal logged 🥗');}
  save();_mealBuilderItems=[];closeOverlay();if(_mealTargetDate===today())renderDiet();
}
function saveManualMeal(andSave){
  const p=parseFloat(document.getElementById('m-p').value)||0;const c=parseFloat(document.getElementById('m-c').value)||0;const f=parseFloat(document.getElementById('m-f').value)||0;
  const cal=parseFloat(document.getElementById('m-cal').value)||Math.round(p*4+c*4+f*9);
  const name=document.getElementById('m-name').value||'Meal';const time=document.getElementById('m-time').value;
  S.diet.unshift({id:Date.now(),date:_mealTargetDate,name,p,c,f,cal,time,note:''});
  if(andSave&&!S.savedMeals.find(m=>m.name.toLowerCase()===name.toLowerCase())){S.savedMeals.push({name,p,c,f,cal});toast('Logged + saved 📌');}
  else{toast('Meal logged 🥗');}
  save();closeOverlay();if(_mealTargetDate===today())renderDiet();
}
function useSavedMeal(idx,dateStr){
  const m=S.savedMeals[idx];if(!m)return;
  const time=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  S.diet.unshift({id:Date.now(),date:dateStr,name:m.name,p:m.p,c:m.c,f:m.f,cal:m.cal,time,note:'saved meal'});
  save();toast(m.name+' added ✓');closeOverlay();if(dateStr===today())renderDiet();
}
function deleteSavedMeal(idx){S.savedMeals.splice(idx,1);save();toast('Removed');renderMealModal();}

function saveNewIngredient(){
  const name=document.getElementById('ai-name').value.trim();if(!name){toast('Enter a name');return;}
  const p=parseFloat(document.getElementById('ai-p').value)||0;
  const c=parseFloat(document.getElementById('ai-c').value)||0;
  const f=parseFloat(document.getElementById('ai-f').value)||0;
  const cal=parseFloat(document.getElementById('ai-cal').value)||Math.round(p*4+c*4+f*9);
  const sizes={};const units=['g','oz'];
  ['each','serving','cup','tbsp','slice','scoop'].forEach(u=>{
    const v=parseFloat(document.getElementById('ai-'+u)?.value);
    if(v>0){sizes[u]=v;if(!units.includes(u))units.push(u);}
  });
  const ozV=parseFloat(document.getElementById('ai-oz')?.value);
  if(ozV>0)sizes.oz=ozV;
  const id=name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now();
  S.ingredients.push({id,name,per100:{p,c,f,cal},units,...sizes});
  save();toast(name+' added ✓');renderIngManager();
}

function saveEditIngredient(idx){
  const ing=S.ingredients[idx];
  ing.name=document.getElementById('ei-name').value||ing.name;
  ing.per100.p=parseFloat(document.getElementById('ei-p').value)||0;
  ing.per100.c=parseFloat(document.getElementById('ei-c').value)||0;
  ing.per100.f=parseFloat(document.getElementById('ei-f').value)||0;
  ing.per100.cal=parseFloat(document.getElementById('ei-cal').value)||Math.round(ing.per100.p*4+ing.per100.c*4+ing.per100.f*9);
  // Update serving sizes and rebuild units array
  const units=['g','oz'];
  ['each','serving','cup','tbsp','oz','slice','scoop'].forEach(u=>{
    const v=parseFloat(document.getElementById('ei-'+u)?.value);
    if(v>0){ing[u]=v;if(!units.includes(u))units.push(u);}
    else delete ing[u];
  });
  ing.units=units;
  save();toast('Updated ✓');renderIngManager();
}

function togEdQ(q){_edQ=_edQ===q?0:q;document.querySelectorAll('[id^="edq-"]').forEach((b,i)=>b.classList.toggle('on',i+1===_edQ));}
function togEdLoc(loc){_edLoc=_edLoc===loc?'':loc;document.getElementById('edloc-home').classList.toggle('on',_edLoc==='home');document.getElementById('edloc-travel').classList.toggle('on',_edLoc==='travel');}
function delMealById(id,dateStr){S.diet=S.diet.filter(m=>m.id!==id);save();openEditDay(dateStr);}
function saveEditDay(dateStr){
  const bwVal=document.getElementById('ed-bw')?.value;const stepsVal=document.getElementById('ed-steps')?.value;const cafVal=document.getElementById('ed-caf')?.value;const slHrs=document.getElementById('ed-sl')?.value;
  const sl=S.sleep.find(s=>s.date===dateStr);const slQ=_edQ||(sl?.q||0);const slLoc=_edLoc||(sl?.loc||'');
  if(bwVal){S.bodyWeight=S.bodyWeight.filter(b=>b.date!==dateStr);S.bodyWeight.unshift({date:dateStr,weight:parseFloat(bwVal)});}
  if(stepsVal){S.steps=S.steps.filter(s=>s.date!==dateStr);S.steps.unshift({date:dateStr,steps:parseInt(stepsVal)||0});}
  if(cafVal){S.caffeine=S.caffeine.filter(c=>c.date!==dateStr);S.caffeine.unshift({date:dateStr,mg:parseInt(cafVal)||0});}
  if(slHrs||slQ||slLoc){S.sleep=S.sleep.filter(s=>s.date!==dateStr);S.sleep.unshift({date:dateStr,hrs:parseFloat(slHrs)||0,q:slQ,loc:slLoc});}
  save();_edQ=0;_edLoc='';closeOverlay();toast('Day updated ✓');
  if(document.getElementById('sc-diet').classList.contains('on'))renderDiet();
}

function wcStat(lbl,cur,prev,unit){const diff=cur-prev;const up=diff>0;return'<div class="wcCell"><div class="wcLbl">'+lbl+'</div><div class="wcVal" style="color:'+(up?'var(--green)':diff<0?'var(--red)':'var(--blue)')+'">'+cur+unit+'</div><div class="wcDiff" style="color:'+(up?'var(--green)':diff<0?'var(--red)':'var(--t3)')+'">'+( diff>0?'+':'')+diff+unit+' vs last week</div></div>';}
function calcStreak(){if(!S.history.length)return 0;const dates=[...new Set(S.history.map(h=>h.date))].sort((a,b)=>new Date(b)-new Date(a));let streak=0;let cur=new Date();cur.setHours(0,0,0,0);for(const d of dates){const dd=new Date(d);dd.setHours(0,0,0,0);if(Math.round((cur-dd)/86400000)>1)break;streak++;cur=dd;}return streak;}

// ═══ LIFT CHART ═══
function getTrackedLifts(){const seen=new Set(),out=[];S.history.forEach(h=>h.exercises?.forEach(e=>{if(!seen.has(e.id)){seen.add(e.id);out.push({id:e.id,name:e.name});}}));return out.slice(0,16);}

// Get all distinct machines used for a given exercise id
function getMachinesForLift(lid){
  const seen=new Set();const out=[];
  S.history.forEach(h=>{
    const ex=h.exercises?.find(e=>e.id===lid);
    if(ex&&ex.sets?.some(s=>s.weight||s.reps)){
      const key=ex.machineId||'__none__';
      if(!seen.has(key)){seen.add(key);out.push({machineId:ex.machineId||'',machineName:ex.machineName||'No machine logged'});}
    }
  });
  return out;
}

function renderLiftChips(){
  const lifts=getTrackedLifts();const wrap=document.getElementById('liftChips');if(!wrap)return;
  if(!lifts.length){wrap.innerHTML='<span style="font-size:12px;color:var(--t3)">Log workouts to see lift progress.</span>';return;}
  if(!SEL_LIFT&&lifts.length)SEL_LIFT=lifts[0].id;
  wrap.innerHTML=lifts.map(l=>'<button class="chip '+(SEL_LIFT===l.id?'on':'')+'" onclick="selLift(\''+l.id+'\')">'+l.name.split(' ').slice(0,3).join(' ')+'</button>').join('');
  renderMachineChips();
}

function renderMachineChips(){
  const row=document.getElementById('machineChipsRow');if(!row||!SEL_LIFT)return;
  const machines=getMachinesForLift(SEL_LIFT);
  if(machines.length<=1){
    // Only one machine (or none) — no filter needed, just draw
    row.innerHTML='';
    drawLiftChart(SEL_LIFT);
    return;
  }
  // Multiple machines — show filter chips
  const allChip='<button class="chip '+(SEL_MACHINE===null?'on':'')+'" onclick="selMachine(null)">All machines</button>';
  const mChips=machines.map(m=>{
    const label=m.machineName==='No machine logged'?'Untagged':m.machineName;
    const shortLabel=label.replace(/Hammer Strength|Life Fitness|Star Trac|Matrix|Hoist/g,'').trim()||label;
    return'<button class="chip '+(SEL_MACHINE===m.machineId?'on':'')+'" onclick="selMachine(\''+m.machineId+'\')">'+shortLabel+'</button>';
  }).join('');
  row.innerHTML='<span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-right:4px;white-space:nowrap;align-self:center">By machine:</span>'+allChip+mChips;
  drawLiftChart(SEL_LIFT);
}

function selLift(id){
  SEL_LIFT=id;
  SEL_MACHINE=null; // reset machine filter when switching exercise
  renderLiftChips();
}
function selMachine(machineId){
  SEL_MACHINE=machineId;
  // Update chip UI
  document.querySelectorAll('#machineChipsRow .chip').forEach(b=>b.classList.remove('on'));
  event.target.classList.add('on');
  drawLiftChart(SEL_LIFT);
}
function setMetric(m){SEL_METRIC=m;['max','best','vol'].forEach(k=>{const el=document.getElementById('mt-'+k);if(el)el.classList.toggle('on',k===m);});if(SEL_LIFT)drawLiftChart(SEL_LIFT);}

function drawLiftChart(lid){
  const canvas=document.getElementById('liftChart');if(!canvas)return;
  let raw=[];
  S.history.slice().reverse().forEach(h=>{
    const ex=h.exercises?.find(e=>e.id===lid);
    if(ex&&ex.sets?.some(s=>s.weight||s.reps)){
      raw.push({date:h.date,sets:ex.sets,machineId:ex.machineId||'',machineName:ex.machineName||''});
    }
  });

  // Apply machine filter
  const filtered=SEL_MACHINE!==null?raw.filter(r=>r.machineId===SEL_MACHINE):raw;
  const metrics=calcExMetrics(filtered);

  const yFn={max:m=>m.maxW,best:m=>m.bestSetVol,vol:m=>m.totalVol}[SEL_METRIC];
  const labels={max:'Max weight (lbs)',best:'Best set (lbs × reps)',vol:'Total volume'}[SEL_METRIC];
  const vals=metrics.map(yFn);const dates=metrics.map(m=>m.date);

  // Machine context label
  let machineContext='';
  if(SEL_MACHINE!==null){
    const m=raw.find(r=>r.machineId===SEL_MACHINE);
    machineContext=m?' · '+m.machineName:'';
  } else if(getMachinesForLift(lid).length>1){
    machineContext=' · all machines combined';
  }

  const meta=document.getElementById('liftChartMeta');
  if(meta)meta.textContent=labels+(metrics.length?' · '+metrics.length+' sessions':'')+machineContext;

  const summary=document.getElementById('liftSummary');
  if(summary&&metrics.length){
    const latest=metrics[metrics.length-1];const prev=metrics.length>=2?metrics[metrics.length-2]:null;
    const allTime=metrics.reduce((b,m)=>yFn(m)>yFn(b)?m:b,metrics[0]);
    const diffStr=prev?(()=>{const d=yFn(latest)-yFn(prev);const col=d>0?'var(--green)':d<0?'var(--red)':'var(--t3)';return'<span style="color:'+col+';font-weight:700">'+(d>0?'↑':'↓')+' '+Math.abs(Math.round(d))+' vs last session</span>';})():'';
    const mStr=latest.machineName?'<div style="font-size:11px;color:var(--teal);margin-top:3px">Machine: '+latest.machineName+'</div>':'';
    const detail={max:'<span style="font-family:var(--fm);font-size:22px;font-weight:600;color:var(--green)">'+latest.maxW+'lbs</span> max · all-time: <span style="color:var(--amber);font-weight:600">'+allTime.maxW+'lbs</span>',best:'<span style="font-family:var(--fm);font-size:22px;font-weight:600;color:var(--green)">'+latest.bestSet.w+'×'+latest.bestSet.r+'</span> best set · vol: '+latest.bestSetVol,vol:'<span style="font-family:var(--fm);font-size:22px;font-weight:600;color:var(--green)">'+latest.totalVol+'</span> total vol'}[SEL_METRIC];
    const setsStr=latest.sets.filter(s=>s.w||s.r).map(s=>s.w+'×'+s.r+' <span style="color:var(--t3);font-size:10px">('+s.w*s.r+')</span>').join('  ');
    summary.innerHTML='<div style="border-top:1px solid var(--bdr);padding-top:10px"><div>'+detail+'</div><div style="font-size:11px;color:var(--t2);margin-top:6px;font-family:var(--fm)">'+setsStr+'</div><div style="font-size:11px;margin-top:4px">'+diffStr+'</div>'+mStr+'</div>';
  }else if(summary){
    summary.innerHTML=metrics.length===0&&filtered.length===0&&raw.length>0?'<div style="padding:10px 0;font-size:13px;color:var(--t3)">No sessions with this machine yet. Select a different machine or "All machines".</div>':'';
  }
  drawLineCalendar(canvas,vals,dates,'var(--green)',170);
}

function exportBackup(){
  const backup={exportedAt:new Date().toISOString(),version:'lift_v5',data:S,program:PROG};
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');const ds=new Date().toLocaleDateString('en-US').replace(/\//g,'-');
  a.href=url;a.download='lift-backup-'+ds+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('Backup downloaded ✓');
}
function importBackup(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const backup=JSON.parse(e.target.result);if(!backup.data||!backup.version){toast('Invalid backup file');return;}
      const d=backup.data;
      const merge=(ex,inc,key='id')=>{const map=new Map(ex.map(x=>[x[key],x]));inc.forEach(x=>{if(!map.has(x[key]))map.set(x[key],x);});return[...map.values()];};
      S.history=merge(S.history,d.history||[]);
      S.diet=merge(S.diet,d.diet||[]);
      S.sleep=merge(S.sleep,d.sleep||[],'date');
      S.bodyWeight=merge(S.bodyWeight,d.bodyWeight||[],'date');
      S.steps=merge(S.steps,d.steps||[],'date');
      S.caffeine=merge(S.caffeine,d.caffeine||[],'date');
      S.savedMeals=d.savedMeals||S.savedMeals||[];
      if(d.exerciseCatalog?.length)S.exerciseCatalog=d.exerciseCatalog;
      S.skillLogs=d.skillLogs||S.skillLogs;
      S.skills=d.skills||S.skills;
      if(d.machines?.length)S.machines=d.machines;
      if(d.ingredients?.length)S.ingredients=d.ingredients;
      if(backup.program)PROG=backup.program;
      save();saveProg();toast('Backup restored ✓');renderHome();renderHistory();
    }catch(err){toast('Could not read backup file');}
  };
  reader.readAsText(file);event.target.value='';
}

function drawLineCalendar(canvas,vals,dates,color,H,unit){
  if(!canvas)return;
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const W=canvas.parentElement.clientWidth-28,dpr=window.devicePixelRatio||1;
  canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
  if(vals.length<2){ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='12px Barlow';ctx.textAlign='center';ctx.fillText('Log more sessions to see progress',W/2,H/2);return;}
  const pad={t:16,r:12,b:26,l:38};const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;
  const ts=dates.map(d=>new Date(d).getTime());const minT=Math.min(...ts);const maxT=Math.max(...ts);const tSpan=maxT-minT||1;
  const px=i=>pad.l+((ts[i]-minT)/tSpan)*gW;
  const minV=Math.min(...vals)*0.97,maxV=Math.max(...vals)*1.03;
  const py=v=>pad.t+gH-((v-minV)/(maxV-minV||1))*gH;
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)';ctx.lineWidth=1;
  for(let i=0;i<=3;i++){const y=pad.t+(i/3)*gH;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='9px JetBrains Mono';ctx.textAlign='right';ctx.fillText(Math.round(maxV-(i/3)*(maxV-minV)),pad.l-5,y+3);}
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+gH);grad.addColorStop(0,isDark?'rgba(45,212,192,0.2)':'rgba(15,158,146,0.15)');grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.moveTo(px(0),py(vals[0]));vals.forEach((v,i)=>{if(i>0)ctx.lineTo(px(i),py(v));});ctx.lineTo(px(vals.length-1),pad.t+gH);ctx.lineTo(px(0),pad.t+gH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(px(0),py(vals[0]));vals.forEach((v,i)=>{if(i>0)ctx.lineTo(px(i),py(v));});ctx.strokeStyle=color;ctx.lineWidth=2.2;ctx.lineJoin='round';ctx.stroke();
  vals.forEach((v,i)=>{ctx.beginPath();ctx.arc(px(i),py(v),3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.beginPath();ctx.arc(px(i),py(v),2,0,Math.PI*2);ctx.fillStyle=isDark?'#0C0C0F':'#FFFFFF';ctx.fill();const dd=new Date(dates[i]);ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='9px Barlow';ctx.textAlign='center';ctx.fillText((dd.getMonth()+1)+'/'+dd.getDate(),px(i),H-6);});
  if(unit){ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='9px Barlow';ctx.textAlign='left';ctx.fillText(unit,pad.l,12);}
}
function drawBarCalendar(canvas,vals,dates,H){
  if(!canvas||!vals.length)return;
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const W=canvas.parentElement.clientWidth-28,dpr=window.devicePixelRatio||1;

  const ts=dates.map(d=>new Date(d).getTime());const minT=Math.min(...ts);const maxT=Math.max(...ts);const tSpan=maxT-minT||1;
  const maxV=Math.max(...vals,1);const bw=Math.min(gW/(vals.length+1),22);

  data.forEach((d,i)=>{const bh=(d.cal/maxCal)*gH;const x=pad.l+i*sp+sp/2-bw/2;const y=pad.t+gH-bh;ctx.fillStyle=d.cal>TARGETS.calories?'rgba(240,96,96,0.5)':'rgba(61,219,130,0.4)';ctx.beginPath();ctx.roundRect(x,y,bw,bh,3);ctx.fill();const dd=new Date(d.date);ctx.fillStyle=isDark?'#4A4A5A':'#ABABC0';ctx.font='8px Barlow';ctx.textAlign='center';ctx.fillText(['S','M','T','W','T','F','S'][dd.getDay()],x+bw/2,H-6);});
  const maxP=Math.max(TARGETS.protein*1.3,...data.map(d=>d.prot),1);ctx.beginPath();data.forEach((d,i)=>{const x=pad.l+i*sp+sp/2;const y=pad.t+gH-((d.prot/maxP)*gH);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.strokeStyle=isDark?'#5B9CF6':'#2563EB';ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
  const ty=pad.t+gH-((TARGETS.calories/maxCal)*gH);ctx.beginPath();ctx.moveTo(pad.l,ty);ctx.lineTo(W-pad.r,ty);ctx.strokeStyle='rgba(245,166,35,0.5)';ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
}

// ═══ EXERCISE CATALOG ═══
function openExerciseCatalog(){
  if(!S.exerciseCatalog)S.exerciseCatalog=[];
  renderExerciseCatalog();openOverlay();
}
function renderExerciseCatalog(){
  const byMovement={};
  [...(S.exerciseCatalog||[])].sort((a,b)=>a.name.localeCompare(b.name)).forEach((ex,i)=>{
    const mv=ex.movement||'Other';
    if(!byMovement[mv])byMovement[mv]=[];
    byMovement[mv].push({...ex,_i:S.exerciseCatalog.indexOf(ex)});
  });
  let h='<div class="shTitle">Exercise Catalog</div><div class="shSub">'+(S.exerciseCatalog?.length||0)+' exercises · pick from here when editing your program</div>';
  h+='<button onclick="openAddCatalogEx()" style="width:100%;padding:10px;border-radius:var(--rsm);background:var(--gd);border:1px dashed var(--green);font-size:13px;font-weight:700;color:var(--green);margin-bottom:12px">+ Add Exercise</button>';
  if(!S.exerciseCatalog?.length){
    h+='<div class="empty"><div class="emIco">📋</div><div class="emT">Catalog is empty</div><div class="emS">Add exercises here to quickly swap them into any day\'s workout via the program editor.</div></div>';
  }else{
    Object.entries(byMovement).forEach(([mv,exercises])=>{
      h+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin:12px 0 6px">'+mv+'</div>';
      exercises.forEach(ex=>{
        h+='<div style="background:var(--bg3);border-radius:var(--rsm);padding:10px 12px;margin-bottom:6px">'
          +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">'
          +'<div style="font-size:13px;font-weight:600">'+ex.name+'</div>'
          +'<div style="display:flex;gap:6px">'
          +'<button onclick="openEditCatalogEx('+ex._i+')" style="font-size:11px;color:var(--blue);padding:3px 8px;border-radius:20px;background:var(--bd)">Edit</button>'
          +'<button onclick="deleteCatalogEx('+ex._i+')" style="color:var(--red);font-size:16px;padding:0 2px">×</button>'
          +'</div></div>'
          +'<div style="font-family:var(--fm);font-size:11px;color:var(--t2)">'+ex.rx+' · '+ex.rpe+'</div>'
          +(ex.muscle?'<div style="font-size:11px;color:var(--blue);margin-top:2px">'+ex.muscle+'</div>':'')
          +'</div>';
      });
    });
  }
  document.getElementById('sheetBody').innerHTML=h;
}
function catalogMachineOptions(movement,curId){
  const mv=movement&&movement!=='Other'?movement:'';
  const filtered=mv?S.machines.filter(m=>m.movement===mv):[];
  const universal=S.machines.filter(m=>['Free Weights','Bodyweight','Various'].includes(m.brand));
  const list=filtered.length?[...filtered,...universal.filter(u=>!filtered.includes(u))]:universal;
  return'<option value="">— None / decide each session —</option>'+list.map(m=>'<option value="'+m.id+'"'+(m.id===curId?' selected':'')+'>'+m.brand+' '+m.name+'</option>').join('');
}
function openAddCatalogEx(){
  document.getElementById('sheetBody').innerHTML=
    '<div class="shTitle">Add to Catalog</div>'
    +'<div class="field"><div class="fLbl">Exercise Name</div><input class="fInp" id="cex-name" placeholder="e.g. Hammer Strength Leg Curl"></div>'
    +'<div class="field"><div class="fLbl">Movement type</div><select class="fInp" id="cex-movement" onchange="refreshCatalogMachines()"><option value="">— Select —</option>'+MOVEMENT_TYPES.map(m=>'<option value="'+m+'">'+m+'</option>').join('')+'</select></div>'
    +'<div class="field"><div class="fLbl">Default machine <span style="font-weight:400;text-transform:none;color:var(--t3)">— pre-selects in workout</span></div><select class="fInp" id="cex-defmachine">'+catalogMachineOptions('','')+'</select></div>'
    +'<div class="r2" style="margin-bottom:12px"><div><div class="fLbl">Sets × Reps</div><input class="fInp" id="cex-rx" placeholder="3 × 10-12"></div><div><div class="fLbl">Default Sets</div><input class="fInp" id="cex-sets" type="number" placeholder="3"></div></div>'
    +'<div class="r2" style="margin-bottom:12px"><div><div class="fLbl">RPE</div><input class="fInp" id="cex-rpe" placeholder="RPE 8"></div><div><div class="fLbl">Rest</div><input class="fInp" id="cex-rest" placeholder="90 sec"></div></div>'
    +'<div class="field"><div class="fLbl">Muscle</div><input class="fInp" id="cex-muscle" placeholder="e.g. Hamstrings — stretch"></div>'
    +'<div class="field"><div class="fLbl">Notes / form cue</div><textarea class="fInp" id="cex-note" rows="2" placeholder="Full stretch at bottom..."></textarea></div>'
    +'<button class="saveBtn" onclick="saveAddCatalogEx()">ADD TO CATALOG</button>'
    +'<button onclick="renderExerciseCatalog()" style="width:100%;padding:10px;font-size:13px;color:var(--t2);margin-top:8px">← Back</button>';
}
function refreshCatalogMachines(){
  const mv=document.getElementById('cex-movement')?.value;
  const sel=document.getElementById('cex-defmachine');
  if(sel)sel.innerHTML=catalogMachineOptions(mv,'');
}
function saveAddCatalogEx(){
  const name=document.getElementById('cex-name').value.trim();
  if(!name){toast('Enter a name');return;}
  if(!S.exerciseCatalog)S.exerciseCatalog=[];
  const movement=document.getElementById('cex-movement').value;
  const defMachine=document.getElementById('cex-defmachine')?.value||'';
  S.exerciseCatalog.push({
    id:name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now(),
    name,movement:movement||'',
    defaultMachineId:defMachine,
    rx:document.getElementById('cex-rx').value||'3 × 10-12',
    rpe:document.getElementById('cex-rpe').value||'RPE 8',
    rest:document.getElementById('cex-rest').value||'90 sec',
    muscle:document.getElementById('cex-muscle').value||'',
    note:document.getElementById('cex-note').value||'',
    sets:parseInt(document.getElementById('cex-sets').value)||3
  });
  save();toast(name+' added to catalog ✓');renderExerciseCatalog();
}
function openEditCatalogEx(idx){
  const ex=S.exerciseCatalog[idx];if(!ex)return;
  const curMv=ex.movement||'';
  document.getElementById('sheetBody').innerHTML=
    '<div class="shTitle">Edit Exercise</div>'
    +'<div class="field"><div class="fLbl">Name</div><input class="fInp" id="cex-name" value="'+ex.name+'"></div>'
    +'<div class="field"><div class="fLbl">Movement type</div><select class="fInp" id="cex-movement" onchange="refreshCatalogMachines()"><option value="">— Select —</option>'+MOVEMENT_TYPES.map(m=>'<option value="'+m+'"'+(m===curMv?' selected':'')+'>'+m+'</option>').join('')+'</select></div>'
    +'<div class="field"><div class="fLbl">Default machine</div><select class="fInp" id="cex-defmachine">'+catalogMachineOptions(curMv,ex.defaultMachineId||'')+'</select></div>'
    +'<div class="r2" style="margin-bottom:12px"><div><div class="fLbl">Sets × Reps</div><input class="fInp" id="cex-rx" value="'+ex.rx+'"></div><div><div class="fLbl">Default Sets</div><input class="fInp" id="cex-sets" type="number" value="'+ex.sets+'"></div></div>'
    +'<div class="r2" style="margin-bottom:12px"><div><div class="fLbl">RPE</div><input class="fInp" id="cex-rpe" value="'+ex.rpe+'"></div><div><div class="fLbl">Rest</div><input class="fInp" id="cex-rest" value="'+ex.rest+'"></div></div>'
    +'<div class="field"><div class="fLbl">Muscle</div><input class="fInp" id="cex-muscle" value="'+ex.muscle+'"></div>'
    +'<div class="field"><div class="fLbl">Notes</div><textarea class="fInp" id="cex-note" rows="2">'+ex.note+'</textarea></div>'
    +'<button class="saveBtn" onclick="saveEditCatalogEx('+idx+')">SAVE</button>'
    +'<button onclick="renderExerciseCatalog()" style="width:100%;padding:10px;font-size:13px;color:var(--t2);margin-top:8px">← Back</button>';
}
function saveEditCatalogEx(idx){
  const ex=S.exerciseCatalog[idx];if(!ex)return;
  ex.name=document.getElementById('cex-name').value||ex.name;
  ex.movement=document.getElementById('cex-movement').value||'';
  ex.defaultMachineId=document.getElementById('cex-defmachine')?.value||'';
  ex.rx=document.getElementById('cex-rx').value||ex.rx;
  ex.sets=parseInt(document.getElementById('cex-sets').value)||ex.sets;
  ex.rpe=document.getElementById('cex-rpe').value||ex.rpe;
  ex.rest=document.getElementById('cex-rest').value||ex.rest;
  ex.muscle=document.getElementById('cex-muscle').value||'';
  ex.note=document.getElementById('cex-note').value||'';
  save();toast('Updated ✓');renderExerciseCatalog();
}
function deleteCatalogEx(idx){S.exerciseCatalog.splice(idx,1);save();renderExerciseCatalog();toast('Removed');}

// ═══ FOOD LIBRARY SCREEN ═══
function openFoodLibrary(){
  document.getElementById('sheetBody').innerHTML=
    '<div class="shTitle">Food Library</div>'
    +'<div class="shSub">Manage ingredients and saved meals</div>'
    +'<div class="lbl" style="margin-top:0">Ingredients ('+S.ingredients.length+')</div>'
    +'<div style="font-size:13px;color:var(--t2);margin-bottom:10px;line-height:1.5">Add foods with macros per 100g. Use them in the meal builder to auto-calculate macros from actual quantities.</div>'
    +'<button onclick="openIngredientManager()" style="width:100%;padding:11px;border-radius:var(--rsm);background:var(--bg3);border:1px solid var(--bdr);font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px">🥦 Open Ingredient Library ('+S.ingredients.length+')</button>'
    +'<div class="lbl">Saved Meals ('+S.savedMeals.length+')</div>'
    +'<div style="font-size:13px;color:var(--t2);margin-bottom:10px;line-height:1.5">One-tap meals for things you eat regularly. Log them on any day without re-entering macros.</div>'
    +'<button onclick="openSavedMealsManager()" style="width:100%;padding:11px;border-radius:var(--rsm);background:var(--bg3);border:1px solid var(--bdr);font-size:13px;font-weight:700;color:var(--green)">⭐ Open Saved Meals ('+S.savedMeals.length+')</button>';
  openOverlay();
}
